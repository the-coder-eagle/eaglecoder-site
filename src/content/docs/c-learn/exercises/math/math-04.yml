  - "第一步：先在纸上画出你的思路或算法流程。"
  - "第二步：确定边界情况——空输入、最大值、负数等怎么处理？"
  - "第三步：选择合适的数据结构——数组？指针？结构体？"
  - "第四步：用示例中的测试数据验证你的程序。"
  - "提示：开发时可以用 printf 打印中间变量来调试逻辑。"
solution_code: |
  int main(){
      int n,c=0; scanf("%d",&n);
      while(n){ c+=n/5; n/=5; }
      printf("%d\n",c); return 0;
  }
