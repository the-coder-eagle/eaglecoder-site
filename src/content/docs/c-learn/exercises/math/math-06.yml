hints:
  - "初始化全为 1"
  - "从 2 开始，把倍数全标记为 0"
  - "is_prime[i*i] → i*i ≤ n"
  - "第一步：先在纸上画出你的思路或算法流程。"
  - "第二步：确定边界情况——空输入、最大值、负数等怎么处理？"
  - "第三步：选择合适的数据结构——数组？指针？结构体？"
  - "第四步：用示例中的测试数据验证你的程序。"
  - "提示：开发时可以用 printf 打印中间变量来调试逻辑。"
solution_code: |
  int main(){
      int n,p[10001]; scanf("%d",&n);
      for(int i=2;i<=n;i++) p[i]=1;
      for(int i=2;i*i<=n;i++) if(p[i]) for(int j=i*i;j<=n;j+=i) p[j]=0;
      for(int i=2;i<=n;i++) if(p[i]) printf("%d ",i);
      printf("\n"); return 0;
  }
