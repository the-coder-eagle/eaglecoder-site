id: math-03
title: "十进制转任意进制"
difficulty: medium
tags:
  - "数学"
  - "进制转换"
  - "栈"
description_md: |
  ## 背景故事
  
  编程和数学密不可分。很多看似复杂的数学问题，用几行代码就能解决——不是因为你数学好，而是因为计算机可以穷举、迭代、快速验证。这些题目帮你建立用代码解决数学问题的思维模式。
  
  ## 题目描述
  
  输入一个非负整数 N 和进制 B (2≤B≤16)。输出 N 的 B 进制表示。超过 9 的数字用大写字母 A-F。
  
  **Tags: 数学, 进制转换, 栈** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 数学
  C 语言 `<math.h>` 提供数学函数：`sqrt()` 开方、`pow()` 幂、`abs()` 绝对值、`fabs()` 浮点绝对值。编译时可能需要加 `-lm` 链接数学库。
  
  ### 栈
  栈（Stack）是一种后进先出（LIFO）的数据结构，像一摞盘子。操作：push（压入）、pop（弹出）、top（查看栈顶）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `255 16\n` | `FF\n` | Sample 1 |
  | `10 2\n` | `1010\n` | Sample 2 |
  | `0 8\n` | `0\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 不断取余存入数组
  2. 从后往前输出
  3. n=0 时直接输出 0
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
