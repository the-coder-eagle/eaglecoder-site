solution_code: |
  int main(){
      int n,b,i=0; char r[64],d[]="0123456789ABCDEF";
      scanf("%d %d",&n,&b);
      if(!n){ printf("0\n"); return 0; }
      while(n){ r[i++]=d[n%b]; n/=b; }
      while(i--) printf("%c",r[i]);
      printf("\n"); return 0;
  }
