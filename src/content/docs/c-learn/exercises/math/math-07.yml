solution_code: |
  int c_d(const void*a,const void*b){ return *(char*)b-*(char*)a; }
  int c_a(const void*a,const void*b){ return *(char*)a-*(char*)b; }
  int main(){
      int n,st=0; scanf("%d",&n);
      while(n!=6174&&n!=0){
          char d[5]; sprintf(d,"%04d",n);
          qsort(d,4,1,c_d); int mx=atoi(d);
          qsort(d,4,1,c_a); int mn=atoi(d);
          n=mx-mn; st++;
      }
      printf("%d\n",st); return 0;
  }
