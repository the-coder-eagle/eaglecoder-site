description_md: |
  ## 背景故事
  
  编程和数学密不可分。很多看似复杂的数学问题，用几行代码就能解决——不是因为你数学好，而是因为计算机可以穷举、迭代、快速验证。这些题目帮你建立用代码解决数学问题的思维模式。
  
  ## 题目描述
  
  卡普雷卡常数 6174：对任意一个各位不全相同的四位数，用其最大排列减最小排列，重复操作必然收敛到 6174。输入一个四位数，输出收敛所需的步骤数。
  
  **Tags: 数学, 数字操作, 排序** | **Difficulty: 困难**
  
  ## 关键概念
  
  ### 数学
  C 语言 `<math.h>` 提供数学函数：`sqrt()` 开方、`pow()` 幂、`abs()` 绝对值、`fabs()` 浮点绝对值。编译时可能需要加 `-lm` 链接数学库。
  
  ### 排序
  排序是把数据从小到大（或从大到小）排列。常见排序算法：冒泡排序（相邻比较交换）、选择排序（每次选最小的放前面）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `1234\n` | `3\n` | Sample 1 |
  | `6174\n` | `0\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：困难
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 分离各位数字
  2. 排序后组合成最大和最小
  3. 当结果为 6174 或 0 时停止
  4. 第一步：把大问题拆解成几个小问题分别解决。
  5. 第二步：考虑时间复杂度——你的算法能处理最大规模的数据吗？
  6. 第三步：先显式处理所有边界情况，再写主逻辑。
  7. 第四步：暴力解法可能超时（TLE），选择更高效的算法。
  8. 第五步：用极端数据测试——最小值、最大值、零、负数、重复值。
  
