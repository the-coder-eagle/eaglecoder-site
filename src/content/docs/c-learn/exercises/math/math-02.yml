description_md: |
  ## 背景故事
  
  编程和数学密不可分。很多看似复杂的数学问题，用几行代码就能解决——不是因为你数学好，而是因为计算机可以穷举、迭代、快速验证。这些题目帮你建立用代码解决数学问题的思维模式。
  
  ## 题目描述
  
  输入 N (N≤10000)，找出所有 ≤N 的亲密数对 (a,b) 满足 a≠b 且 a 的真因子和=b, b 的真因子和=a。每行输出一对 a<b。
  
  **Tags: 数学, 因子, 亲密数** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 数学
  C 语言 `<math.h>` 提供数学函数：`sqrt()` 开方、`pow()` 幂、`abs()` 绝对值、`fabs()` 浮点绝对值。编译时可能需要加 `-lm` 链接数学库。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `300\n` | `220 284\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 先算所有数的因子和
  2. 遍历匹配 sum_div[sum_div[i]] == i && i < sum_div[i]
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
