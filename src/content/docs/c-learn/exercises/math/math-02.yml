solution_code: |
  int sd(int n){ int s=0; for(int i=1;i<=n/2;i++) if(n%i==0) s+=i; return s; }
  int main(){
      int n; scanf("%d",&n);
      for(int i=2;i<=n;i++){
          int j=sd(i);
          if(j>i && j<=n && sd(j)==i) printf("%d %d\n",i,j);
      }
      return 0;
  }
