id: math-01
title: "勾股数检测"
difficulty: easy
tags:
  - "数学"
  - "勾股定理"
  - "三角形"
description_md: |
  ## 背景故事
  
  编程和数学密不可分。很多看似复杂的数学问题，用几行代码就能解决——不是因为你数学好，而是因为计算机可以穷举、迭代、快速验证。这些题目帮你建立用代码解决数学问题的思维模式。
  
  ## 题目描述
  
  输入三个正整数，判断它们能否构成直角三角形的三条边（a²+b²=c² 或其排列）。输出 YES/NO。
  
  **Tags: 数学, 勾股定理, 三角形** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 数学
  C 语言 `<math.h>` 提供数学函数：`sqrt()` 开方、`pow()` 幂、`abs()` 绝对值、`fabs()` 浮点绝对值。编译时可能需要加 `-lm` 链接数学库。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `3 4 5\n` | `YES\n` | Sample 1 |
  | `5 12 13\n` | `YES\n` | Sample 2 |
  | `2 3 4\n` | `NO\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 排序后检测 a²+b²=c²
  2. 最多三种排列方式
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
