id: basic-07
title: "闰年判断"
difficulty: easy
tags:
  - "条件判断"
  - "逻辑运算"
description_md: |
  ## 背景故事
  
  这是你 C 语言学习之旅的起点。掌握输入输出是编程的第一步——无论是开发一个计算器、一个游戏，还是一个人工智能系统，都离不开最基础的数据输入和结果显示。本节的所有题目都只需要用到最基础的语法，但它们是建造高楼大厦的地基。
  
  ## 题目描述
  
  输入年份，判断是否为闰年。规则: 能被4整除但不能被100整除，或能被400整除。输出 YES 或 NO。
  
  **Tags: 条件判断, 逻辑运算** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `2000\n` | `YES\n` | Sample 1 |
  | `1900\n` | `NO\n` | Sample 2 |
  | `2024\n` | `YES\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. (year % 4 == 0 && year % 100 != 0) || year % 400 == 0
  2. 第一步：仔细读题，明确输入什么、输出什么。
  3. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  4. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  5. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  6. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  7. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
template_code: |
  #include <stdio.h>
  
  int main() {
      // Write your code here
      return 0;
  }
test_cases:
  - input: "2000
"
    expected_output: "YES
"
  - input: "1900
"
    expected_output: "NO
"
  - input: "2024
"
    expected_output: "YES
"
hints:
  - "(year % 4 == 0 && year % 100 != 0) || year % 400 == 0"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  #include <stdio.h>
  int main() {
      int year;
      scanf("%d", &year);
      if ((year % 4 == 0 && year % 100 != 0) || year % 400 == 0)
          printf("YES\n");
      else printf("NO\n");
      return 0;
  }
