id: fahrenheit-to-celsius
title: "华氏转摄氏"
difficulty: easy
tags:
  - "变量"
  - "运算符"
  - "浮点数"
description_md: |
  ## 背景故事
  
  这是你 C 语言学习之旅的起点。掌握输入输出是编程的第一步——无论是开发一个计算器、一个游戏，还是一个人工智能系统，都离不开最基础的数据输入和结果显示。本节的所有题目都只需要用到最基础的语法，但它们是建造高楼大厦的地基。
  
  ## 题目描述
  
  将华氏温度 F 转换为摄氏温度 C。公式: C = (F - 32) * 5 / 9
  输入一个整数 F，输出浮点数 C，保留 2 位小数。
  
  **Tags: 变量, 运算符, 浮点数** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 变量
  变量是存储数据的容器。声明格式：`类型 变量名 = 初始值;`。必须先声明后使用。
  
  ### 运算符
  算术运算符：`+ - * / %`（加减乘除取余）。比较运算符：`> < >= <= == !=`。`==` 是判断相等，`=` 是赋值，别搞混！
  
  ### 浮点数
  浮点数（float/double）存储小数。float 精度约 6-7 位，double 精度约 15 位。输出控制：`printf("%.2f", num)` 保留 2 位小数。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `32\n` | `0.00\n` | Sample 1 |
  | `212\n` | `100.00\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 使用 float 类型存储结果
  2. printf("%.2f", c) 保留两位小数
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
template_code: |
  #include <stdio.h>
  
  int main() {
      // Write your code here
      return 0;
  }
test_cases:
  - input: "32
"
    expected_output: "0.00
"
  - input: "212
"
    expected_output: "100.00
"
hints:
  - "使用 float 类型存储结果"
  - "printf('%.2f', c) 保留两位小数"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  #include <stdio.h>
  int main() {
      int f;
      scanf("%d", &f);
      float c = (f - 32.0) * 5 / 9;
      printf("%.2f\n", c);
      return 0;
  }
