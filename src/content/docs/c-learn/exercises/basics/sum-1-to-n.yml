id: sum-1-to-n
title: "求1到N的和"
difficulty: easy
tags:
  - "for循环"
  - "累加"
description_md: |
  ## 背景故事
  
  这是你 C 语言学习之旅的起点。掌握输入输出是编程的第一步——无论是开发一个计算器、一个游戏，还是一个人工智能系统，都离不开最基础的数据输入和结果显示。本节的所有题目都只需要用到最基础的语法，但它们是建造高楼大厦的地基。
  
  ## 题目描述
  
  Solve: 求1到N的和. Read the input/output format and examples below carefully.
  
  **Tags: for循环, 累加** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### for循环
  `for (初始化; 条件; 更新) { 循环体 }`。经典写法 `for (int i = 0; i < n; i++)` 表示循环 n 次（i 从 0 到 n-1）。
  
  ### 累加
  累加是循环最基础的用法：`sum = sum + i`（可简写为 `sum += i`）。关键是 sum 的初始值要设为 0。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `10\n` | `55\n` | Sample 1 |
  | `100\n` | `5050\n` | Sample 2 |
  | `1\n` | `1\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. for(int i=1; i<=n; i++)
  2. 用 sum += i 累加
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
