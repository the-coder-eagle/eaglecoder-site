solution_code: |
  void enq(int x){
      if(size==CAP){ printf("FULL "); return; }
      q[rear]=x; rear=(rear+1)%CAP; size++;
  }
  int deq(){
      if(size==0){ printf("EMPTY "); return -1; }
      int v=q[front]; front=(front+1)%CAP; size--;
      printf("%d ",v); return v;
  }
