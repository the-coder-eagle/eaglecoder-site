description_md: |
  ## 背景故事
  
  栈和队列是计算机科学中最基础的两种数据结构。栈像一摞盘子——后进先出（LIFO）；队列像排队买东西——先进先出（FIFO）。从浏览器的后退按钮到操作系统的任务调度，栈和队列无处不在。
  
  ## 题目描述
  
  用数组实现循环队列，容量为 5。支持 enqueue x 和 dequeue 操作。输入 N 个操作，对 dequeue 输出取出的值；队列空时 dequeue 输出 EMPTY；队列满时 enqueue 输出 FULL 但忽略操作。
  
  **Tags: 队列, 循环数组, 模运算** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 队列
  队列（Queue）是一种先进先出（FIFO）的数据结构，像排队。操作：enqueue（入队）、dequeue（出队）、front（查看队首）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `6\nenqueue 10\nenqueue 20\ndequeue\ndequ` | `10 20 EMPTY\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. rear = (rear+1) % CAP
  2. front = (front+1) % CAP
  3. size 跟踪元素数
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
