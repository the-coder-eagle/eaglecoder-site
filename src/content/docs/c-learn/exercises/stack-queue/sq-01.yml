solution_code: |
  #include <stdio.h>
  #include <string.h>
  int main(){
      char s[200], stk[200]; int top=-1;
      scanf("%s",s);
      for(int i=0;s[i];i++){
          if(s[i]=='('||s[i]=='['||s[i]=='{') stk[++top]=s[i];
          else{
              if(top==-1){ printf("NO\n"); return 0; }
              char c=stk[top--];
              if((s[i]==')'&&c!='(')||(s[i]==']'&&c!='[')||(s[i]=='}'&&c!='{')){ printf("NO\n"); return 0; }
          }
      }
      printf(top==-1?"YES\n":"NO\n"); return 0;
  }
