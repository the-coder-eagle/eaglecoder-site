  - "括号匹配"
description_md: |
  ## 背景故事
  
  栈和队列是计算机科学中最基础的两种数据结构。栈像一摞盘子——后进先出（LIFO）；队列像排队买东西——先进先出（FIFO）。从浏览器的后退按钮到操作系统的任务调度，栈和队列无处不在。
  
  ## 题目描述
  
  输入一个由 ()[]{} 组成的字符串，判断括号是否有效匹配。输出 YES/NO。
  
  **Tags: 栈, 括号匹配** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 栈
  栈（Stack）是一种后进先出（LIFO）的数据结构，像一摞盘子。操作：push（压入）、pop（弹出）、top（查看栈顶）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `()[]{}\n` | `YES\n` | Sample 1 |
  | `([)]\n` | `NO\n` | Sample 2 |
  | `()\n` | `YES\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 遇到左括号入栈
  2. 遇到右括号检查栈顶
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
