solution_code: |
  int main(){
      char e[200]; int s[200],t=-1;
      scanf("%s",e);
      for(int i=0;e[i];i++){
          if(isdigit(e[i])) s[++t]=e[i]-'0';
          else{
              int b=s[t--], a=s[t--];
              if(e[i]=='+') s[++t]=a+b;
              else if(e[i]=='-') s[++t]=a-b;
              else if(e[i]=='*') s[++t]=a*b;
              else if(e[i]=='/') s[++t]=a/b;
          }
      }
      printf("%d\n",s[t]); return 0;
  }
