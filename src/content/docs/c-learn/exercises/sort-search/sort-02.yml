solution_code: |
  int tmp[100];
  void merge(int a[],int l,int m,int r){
      int i=l,j=m+1,k=l;
      while(i<=m&&j<=r) tmp[k++]=a[i]<=a[j]?a[i++]:a[j++];
      while(i<=m) tmp[k++]=a[i++];
      while(j<=r) tmp[k++]=a[j++];
      for(i=l;i<=r;i++) a[i]=tmp[i];
  }
  void ms(int a[],int l,int r){
      if(l>=r) return;
      int m=l+(r-l)/2;
      ms(a,l,m); ms(a,m+1,r); merge(a,l,m,r);
  }
