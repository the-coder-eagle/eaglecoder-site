description_md: |
  ## 背景故事
  
  排序和查找是程序员的基本功。数据量小时怎么排都行，数据量大时算法的选择决定了程序是运行 1 秒还是 1 小时。理解排序算法能帮你建立算法复杂度的直觉——这是从初级程序员到高级程序员的必经之路。
  
  ## 题目描述
  
  Solve: 归并排序. Read the input/output format and examples below carefully.
  
  **Tags: 排序, 归并排序, 分治** | **Difficulty: 困难**
  
  ## 关键概念
  
  ### 排序
  排序是把数据从小到大（或从大到小）排列。常见排序算法：冒泡排序（相邻比较交换）、选择排序（每次选最小的放前面）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5\n5 3 1 4 2\n` | `1 2 3 4 5\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：困难
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 不断二分到单个元素
  2. 合并两个有序数组
  3. 第一步：把大问题拆解成几个小问题分别解决。
  4. 第二步：考虑时间复杂度——你的算法能处理最大规模的数据吗？
  5. 第三步：先显式处理所有边界情况，再写主逻辑。
  6. 第四步：暴力解法可能超时（TLE），选择更高效的算法。
  7. 第五步：用极端数据测试——最小值、最大值、零、负数、重复值。
  8. 数据结构提示：选择正确的数据结构可以大幅降低代码复杂度。
  
