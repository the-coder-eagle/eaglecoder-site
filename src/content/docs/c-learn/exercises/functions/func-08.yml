id: func-08
title: "哥德巴赫验证"
difficulty: medium
tags:
  - "函数"
  - "素数"
  - "哥德巴赫"
description_md: |
  ## 背景故事
  
  函数是代码复用的基础。你不会想每次打印输出都重写一遍 printf 的代码吧？把常用的操作打包成函数，一次编写，到处调用。函数让代码变得模块化、可测试、可维护。专业程序员写代码就像搭积木——每个函数是一块积木。
  
  ## 题目描述
  
  编写函数 `int is_prime(int n)` 判断素数。对输入的大于 2 的偶数 N (N≤1000)，找到两个素数 p 和 q 使 N=p+q，输出 p 最小的一对。
  
  **Tags: 函数, 素数, 哥德巴赫** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 函数
  函数是一段有名字、可复用的代码。定义：`返回类型 函数名(参数) { ... return 值; }`。调用：`函数名(参数);`。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `10\n` | `3 7\n` | Sample 1 |
  | `100\n` | `3 97\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 从 p=2 开始遍历
  2. 检测 p 和 n-p 是否都是素数
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
