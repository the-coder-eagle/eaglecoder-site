id: func-09
title: "回调排序"
difficulty: medium
tags:
  - "函数指针"
  - "回调"
  - "排序"
description_md: |
  ## 背景故事
  
  函数是代码复用的基础。你不会想每次打印输出都重写一遍 printf 的代码吧？把常用的操作打包成函数，一次编写，到处调用。函数让代码变得模块化、可测试、可维护。专业程序员写代码就像搭积木——每个函数是一块积木。
  
  ## 题目描述
  
  编写函数 `void sort(int *arr, int n, int (*cmp)(int, int))`，用冒泡排序对数组排序。提供升序 `cmp_asc` 和降序 `cmp_desc` 两个比较函数。输入数组 + 指令（0=升序,1=降序），输出排序结果。
  
  **Tags: 函数指针, 回调, 排序** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 排序
  排序是把数据从小到大（或从大到小）排列。常见排序算法：冒泡排序（相邻比较交换）、选择排序（每次选最小的放前面）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5\n3 1 4 1 5\n0\n` | `1 1 3 4 5\n` | Sample 1 |
  | `5\n3 1 4 1 5\n1\n` | `5 4 3 1 1\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 函数指针: int (*cmp)(int,int)
  2. 升序: a>b 时交换
  3. 降序: a<b 时交换
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
