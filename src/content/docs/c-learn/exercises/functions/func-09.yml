solution_code: |
  int cmp_asc(int a,int b){ return a>b; }
  int cmp_desc(int a,int b){ return a<b; }
  void sort(int *a,int n,int(*c)(int,int)){
      for(int i=0;i<n-1;i++)
          for(int j=0;j<n-1-i;j++)
              if(c(a[j],a[j+1])){ int t=a[j]; a[j]=a[j+1]; a[j+1]=t; }
  }
