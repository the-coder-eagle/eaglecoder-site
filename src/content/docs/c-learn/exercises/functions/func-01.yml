id: func-01
title: "计算三角形面积"
difficulty: easy
tags:
  - "函数"
  - "参数"
  - "返回"
description_md: |
  ## 背景故事
  
  函数是代码复用的基础。你不会想每次打印输出都重写一遍 printf 的代码吧？把常用的操作打包成函数，一次编写，到处调用。函数让代码变得模块化、可测试、可维护。专业程序员写代码就像搭积木——每个函数是一块积木。
  
  ## 题目描述
  
  编写函数 `double triangle_area(double base, double height)`，返回三角形面积。然后在 main 中读取底和高，调用函数输出结果，保留2位小数。
  
  **Tags: 函数, 参数, 返回** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 函数
  函数是一段有名字、可复用的代码。定义：`返回类型 函数名(参数) { ... return 值; }`。调用：`函数名(参数);`。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `10 5\n` | `25.00\n` | Sample 1 |
  | `3.5 2.0\n` | `3.50\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 面积 = 底 × 高 ÷ 2
  2. 返回值类型是 double
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
template_code: |
  #include <stdio.h>
  
  int main() {
      // Write your code here
      return 0;
  }
test_cases:
  - input: "10 5
"
    expected_output: "25.00
"
  - input: "3.5 2.0
"
    expected_output: "3.50
"
hints:
  - "面积 = 底 × 高 ÷ 2"
  - "返回值类型是 double"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  double triangle_area(double base, double height) {
      return base * height / 2.0;
  }
