id: func-05
title: "判断完全数"
difficulty: easy
tags:
  - "函数"
  - "因数"
  - "数学"
description_md: |
  ## 背景故事
  
  函数是代码复用的基础。你不会想每次打印输出都重写一遍 printf 的代码吧？把常用的操作打包成函数，一次编写，到处调用。函数让代码变得模块化、可测试、可维护。专业程序员写代码就像搭积木——每个函数是一块积木。
  
  ## 题目描述
  
  编写函数 `int is_perfect(int n)`，判断 n 是否为完全数（等于除自身外所有正因子之和）。如 6=1+2+3。返回 1 或 0。
  
  **Tags: 函数, 因数, 数学** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 函数
  函数是一段有名字、可复用的代码。定义：`返回类型 函数名(参数) { ... return 值; }`。调用：`函数名(参数);`。
  
  ### 数学
  C 语言 `<math.h>` 提供数学函数：`sqrt()` 开方、`pow()` 幂、`abs()` 绝对值、`fabs()` 浮点绝对值。编译时可能需要加 `-lm` 链接数学库。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `6\n` | `YES\n` | Sample 1 |
  | `28\n` | `YES\n` | Sample 2 |
  | `12\n` | `NO\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 遍历 1~n/2 求和因子
  2. 因子: n % i == 0
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
