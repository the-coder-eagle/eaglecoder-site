solution_code: |
  int my_strcmp(char *s1, char *s2) {
      while(*s1 && *s2 && *s1==*s2){ s1++; s2++; }
      if(*s1>*s2) return 1;
      if(*s1<*s2) return -1;
      return 0;
  }
