id: str-05
title: "字符串比较"
difficulty: medium
tags:
  - "字符串"
  - "指针"
description_md: |
  ## 背景故事
  
  字符串处理是实际编程中最常见的任务之一。从用户登录验证到搜索引擎关键词匹配，从文本编辑器到聊天软件，字符串无处不在。C 语言的字符串是字符数组，因此理解字符串能同时加深你对数组和指针的理解。
  
  ## 题目描述
  
  实现自己的 strcmp 函数。比较两个字符串，相等输出 0，s1>s2 输出 1，s1<s2 输出 -1。
  
  **Tags: 字符串, 指针** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 字符串
  C 语言没有字符串类型——字符串是字符数组，以 `\0`（空字符）结尾。`char s[100]` 最多存 99 个有效字符（留 1 个给 `\0`）。
  
  ### 指针
  指针是 C 语言的灵魂——它存储另一个变量的内存地址。`&x` 获取 x 的地址，`*p` 解引用（访问 p 指向的值）。可以理解为：指针 = 快递单号，*指针 = 打开包裹。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `abc abc\n` | `0\n` | Sample 1 |
  | `abd abc\n` | `1\n` | Sample 2 |
  | `abc abd\n` | `-1\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 逐个字符比较
  2. 遇到 \0 或不同字符时停止
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
