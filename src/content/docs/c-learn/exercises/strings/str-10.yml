solution_code: |
  int main(){
      char s1[200],s2[200],t[400];
      scanf("%s %s",s1,s2);
      if(strlen(s1)!=strlen(s2)){ printf("NO\n"); return 0; }
      strcpy(t,s1); strcat(t,s1);
      printf(strstr(t,s2)?"YES\n":"NO\n");
      return 0;
  }
