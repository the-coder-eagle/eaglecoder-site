test_cases:
  - input: "Hello 123!
"
    expected_output: "alpha:5 digit:3 space:1 other:1
"
hints:
  - "isalpha, isdigit 或手动判断 ASCII 范围"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  #include <stdio.h>
  #include <ctype.h>
  int main(){
      char s[200]; gets(s);
      int a=0,d=0,sp=0,o=0;
      for(int i=0;s[i];i++){
          if(isalpha(s[i])) a++;
          else if(isdigit(s[i])) d++;
          else if(s[i]==' ') sp++;
          else o++;
      }
      printf("alpha:%d digit:%d space:%d other:%d\n",a,d,sp,o);
      return 0;
  }
