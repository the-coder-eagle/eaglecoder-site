id: str-08
title: "字符串压缩"
difficulty: medium
tags:
  - "字符串"
  - "压缩"
  - "计数"
description_md: |
  ## 背景故事
  
  字符串处理是实际编程中最常见的任务之一。从用户登录验证到搜索引擎关键词匹配，从文本编辑器到聊天软件，字符串无处不在。C 语言的字符串是字符数组，因此理解字符串能同时加深你对数组和指针的理解。
  
  ## 题目描述
  
  实现基本游程编码：输入一个只含大写字母的字符串，将连续相同字符压缩为"字符+次数"。如 AAA → A3。如果压缩后不比原串短，输出原串。
  
  **Tags: 字符串, 压缩, 计数** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 字符串
  C 语言没有字符串类型——字符串是字符数组，以 `\0`（空字符）结尾。`char s[100]` 最多存 99 个有效字符（留 1 个给 `\0`）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `AAABBBCCCC\n` | `A3B3C4\n` | Sample 1 |
  | `ABC\n` | `ABC\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 遍历统计连续相同字符数
  2. sprintf 拼接结果
  3. 比较压缩前后的长度
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
