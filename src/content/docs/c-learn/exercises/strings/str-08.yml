solution_code: |
  int main(){
      char s[200],r[400]=""; int i=0;
      scanf("%s",s);
      while(s[i]){
          int c=1; while(s[i]==s[i+1]){ c++; i++; }
          char t[10]; sprintf(t,"%c%d",s[i],c);
          strcat(r,t); i++;
      }
      printf("%s\n",strlen(r)<strlen(s)?r:s);
      return 0;
  }
