solution_code: |
  int main(){
      char s[500],w[100],l[100]=""; gets(s);
      int i=0;
      while(s[i]){
          int j=0;
          while(s[i]&&s[i]!=' ') w[j++]=s[i++];
          w[j]='\0';
          if(j>strlen(l)) strcpy(l,w);
          if(s[i]==' ') i++;
      }
      printf("%s\n",l); return 0;
  }
