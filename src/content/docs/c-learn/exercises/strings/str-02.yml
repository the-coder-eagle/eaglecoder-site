hints:
  - "双指针: i=0, j=len-1 交换"
  - "或 strlen 取长度"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  #include <stdio.h>
  #include <string.h>
  int main(){
      char s[200]; scanf("%s",s);
      int l=0,r=strlen(s)-1;
      while(l<r){ char t=s[l]; s[l]=s[r]; s[r]=t; l++; r--; }
      printf("%s\n",s); return 0;
  }
