id: str-02
title: "反转字符串"
difficulty: easy
tags:
  - "字符串"
  - "双指针"
description_md: |
  ## 背景故事
  
  字符串处理是实际编程中最常见的任务之一。从用户登录验证到搜索引擎关键词匹配，从文本编辑器到聊天软件，字符串无处不在。C 语言的字符串是字符数组，因此理解字符串能同时加深你对数组和指针的理解。
  
  ## 题目描述
  
  Solve: 反转字符串. Read the input/output format and examples below carefully.
  
  **Tags: 字符串, 双指针** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 字符串
  C 语言没有字符串类型——字符串是字符数组，以 `\0`（空字符）结尾。`char s[100]` 最多存 99 个有效字符（留 1 个给 `\0`）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `hello\n` | `olleh\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 双指针: i=0, j=len-1 交换
  2. 或 strlen 取长度
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
