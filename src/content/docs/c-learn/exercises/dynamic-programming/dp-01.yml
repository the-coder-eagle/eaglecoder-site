solution_code: |
  #include <stdio.h>
  int main(){
      int n; scanf("%d",&n);
      int a=1,b=2,c;
      if(n==1){ printf("1\n"); return 0; }
      if(n==2){ printf("2\n"); return 0; }
      for(int i=3;i<=n;i++){ c=a+b; a=b; b=c; }
      printf("%d\n",b); return 0;
  }
