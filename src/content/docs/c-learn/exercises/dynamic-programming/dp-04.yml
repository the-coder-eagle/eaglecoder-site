solution_code: |
  int main(){
      int n,c[]={1,5,10,25},dp[1001];
      scanf("%d",&n);
      dp[0]=0;
      for(int i=1;i<=n;i++){
          dp[i]=9999;
          for(int j=0;j<4;j++)
              if(i>=c[j]&&dp[i-c[j]]+1<dp[i]) dp[i]=dp[i-c[j]]+1;
      }
      printf("%d\n",dp[n]); return 0;
  }
