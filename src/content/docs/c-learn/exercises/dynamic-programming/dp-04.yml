id: dp-04
title: "最少硬币找零"
difficulty: medium
tags:
  - "动态规划"
  - "硬币"
  - "找零"
description_md: |
  ## 背景故事
  
  动态规划是算法竞赛中的大杀器。它的核心思想很简单：记住已经算过的结果，避免重复计算。从斐波那契数列到最短路径，DP 能将指数级时间降到多项式时间。这不是魔法，是聪明的记忆。
  
  ## 题目描述
  
  给定硬币面额 {1,5,10,25} 和金额 N (N≤1000)。用最少硬币凑出 N 元。输出最少硬币数。
  
  **Tags: 动态规划, 硬币, 找零** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 动态规划
  DP 核心思想：把大问题拆成小问题，记住小问题的答案，避免重复计算。DP 三步：定义状态 → 找转移方程 → 确定初值。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `36\n` | `3\n` | Sample 1 |
  | `100\n` | `4\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. dp[0]=0, dp[i]=min(dp[i-coin]+1)
  2. 遍历硬币，取最小值
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
