solution_code: |
  #include <stdio.h>
  int main(){
      int n,x; scanf("%d",&n);
      int cur=0, mx=-1e9;
      while(n--){
          scanf("%d",&x);
          cur = cur>0 ? cur+x : x;
          if(cur>mx) mx=cur;
      }
      printf("%d\n",mx); return 0;
  }
