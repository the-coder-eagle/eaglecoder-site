solution_code: |
  #include <stdio.h>
  int main(){
      int n,C,w[100],v[100],dp[1001]={0};
      scanf("%d %d",&n,&C);
      for(int i=0;i<n;i++) scanf("%d %d",&w[i],&v[i]);
      for(int i=0;i<n;i++)
          for(int j=C;j>=w[i];j--)
              if(dp[j-w[i]]+v[i] > dp[j]) dp[j]=dp[j-w[i]]+v[i];
      printf("%d\n",dp[C]); return 0;
  }
