id: dp-03
title: "01背包"
difficulty: hard
tags:
  - "动态规划"
  - "背包问题"
description_md: |
  ## 背景故事
  
  动态规划是算法竞赛中的大杀器。它的核心思想很简单：记住已经算过的结果，避免重复计算。从斐波那契数列到最短路径，DP 能将指数级时间降到多项式时间。这不是魔法，是聪明的记忆。
  
  ## 题目描述
  
  有 N 件物品 (N≤100)，每件重量 w[i]、价值 v[i]。背包容量 C，求最大价值。
  
  **Tags: 动态规划, 背包问题** | **Difficulty: 困难**
  
  ## 关键概念
  
  ### 动态规划
  DP 核心思想：把大问题拆成小问题，记住小问题的答案，避免重复计算。DP 三步：定义状态 → 找转移方程 → 确定初值。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `3 10\n2 6\n3 10\n5 12\n` | `22\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：困难
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. dp[j]=max(dp[j], dp[j-w[i]]+v[i])
  2. 从大到小遍历 j
  3. 第一步：把大问题拆解成几个小问题分别解决。
  4. 第二步：考虑时间复杂度——你的算法能处理最大规模的数据吗？
  5. 第三步：先显式处理所有边界情况，再写主逻辑。
  6. 第四步：暴力解法可能超时（TLE），选择更高效的算法。
  7. 第五步：用极端数据测试——最小值、最大值、零、负数、重复值。
  8. 数据结构提示：选择正确的数据结构可以大幅降低代码复杂度。
  
