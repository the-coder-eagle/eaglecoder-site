solution_code: |
  #include <stdio.h>
  #include <stdlib.h>
  typedef struct Node{ int d; struct Node *n; } Nd;
  int main(){
      int n,x; scanf("%d",&n);
      Nd *h=NULL,*t=NULL;
      for(int i=0;i<n;i++){
          scanf("%d",&x);
          Nd *p=malloc(sizeof(Nd)); p->d=x; p->n=NULL;
          if(!h) h=t=p; else{ t->n=p; t=p; }
      }
      for(Nd *c=h;c;c=c->n) printf("%d ",c->d);
      printf("\n"); return 0;
  }
