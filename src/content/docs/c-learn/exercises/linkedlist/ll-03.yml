solution_code: |
  Nd* merge(Nd *a, Nd *b){
      Nd dm={0,NULL}, *t=&dm;
      while(a&&b){
          if(a->d < b->d){ t->n=a; a=a->n; }
          else{ t->n=b; b=b->n; }
          t=t->n;
      }
      t->n=a?a:b;
      return dm.n;
  }
