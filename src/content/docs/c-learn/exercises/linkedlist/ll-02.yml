description_md: |
  ## 背景故事
  
  链表是入门数据结构的第一课。数组在内存中是连续排列的（像电影院的连座），链表通过指针串联（像寻宝游戏中的线索纸条）。链表让你理解数据在内存中不一定是连续的这个重要概念，是理解所有高级数据结构的基础。
  
  ## 题目描述
  
  Solve: 反转链表. Read the input/output format and examples below carefully.
  
  **Tags: 链表, 反转, 指针操作** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 链表
  链表由节点组成，每个节点有数据和指向下一个节点的指针。优点：动态增长、快速插入删除。缺点：不能随机访问（必须从头遍历）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `4\n1 2 3 4\n` | `4 3 2 1\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 三个指针: prev, curr, next
  2. 迭代反转
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
