id: exp-01
title: "简易内存池"
difficulty: hard
tags:
  - "内存池"
  - "分配器"
  - "底层"
description_md: |
  ## 背景故事
  
  这些题目是为想挑战自己的学习者准备的。它们涉及多个知识点的综合运用，需要你设计数据结构、选择算法、处理边界条件。做对这些题目，你就达到了能独立完成实际项目的能力水平。
  
  ## 题目描述
  
  实现一个固定大小的内存池。预分配一块大内存，实现 pool_alloc 和 pool_free。
  使用自由链表管理空闲块。每个空闲块的前 8 字节存储下一个空闲块的地址。
  池大小 1024 字节，分配 16 字节对齐的块。
  
  **Tags: 内存池, 分配器, 底层** | **Difficulty: 困难**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `` | `32\n1` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：困难
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. init: 把 pool 起始地址写入自由链表
  2. alloc: 遍历自由链表找足够大的块
  3. free: 把释放的块插回自由链表头部
  4. 16 字节对齐：size = (size + 15) & ~15
  5. 第一步：把大问题拆解成几个小问题分别解决。
  6. 第二步：考虑时间复杂度——你的算法能处理最大规模的数据吗？
  7. 第三步：先显式处理所有边界情况，再写主逻辑。
  8. 第四步：暴力解法可能超时（TLE），选择更高效的算法。
  
