solution_code: |
  #include <stdio.h>
  #include <string.h>
  #define SZ 1024
  char p[SZ];void*fl=0;int in=0;
  void init(){fl=p;*(void**)fl=0;in=1;}
  void*alloc(int s){s=(s+15)&~15;void**cur=(void**)&fl;while(*cur){char*b=(char*)*cur;if(b+8+s<=p+SZ){void*nxt=*(void**)b;if(nxt==0||b+8+s<=(char*)nxt){void*res=b+8;*(void**)b=res;if(b+8+s+SZ<=(char*)nxt||!nxt)*(void**)(b+8+s-SZ)=0;else *(void**)(b+8+s-SZ)=0;return res;}return (void*)(b+8);}cur=(void**)((char*)*cur);}return 0;}
