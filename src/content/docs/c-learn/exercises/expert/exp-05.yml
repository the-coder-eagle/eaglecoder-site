solution_code: |
  #include <stdio.h>
  #include <string.h>
  #define MAX 1000
  void bs(int a[],int n){unsigned char bits[MAX/8+1]={0};for(int i=0;i<n;i++)bits[a[i]/8]|=(1<<(a[i]%8));for(int i=1;i<=MAX;i++)if(bits[i/8]&(1<<(i%8)))printf("%d ",i);}
