id: exp-05
title: "位图排序"
difficulty: medium
tags:
  - "位图"
  - "排序"
  - "大数组"
description_md: |
  ## 背景故事
  
  这些题目是为想挑战自己的学习者准备的。它们涉及多个知识点的综合运用，需要你设计数据结构、选择算法、处理边界条件。做对这些题目，你就达到了能独立完成实际项目的能力水平。
  
  ## 题目描述
  
  用位图（bitmap）对不重复的正整数排序。
  输入 n 个 1-1000 之间不重复的整数，输出升序排列。
  要求：O(n) 时间，O(max_value/8) 空间。
  
  **Tags: 位图, 排序, 大数组** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 排序
  排序是把数据从小到大（或从大到小）排列。常见排序算法：冒泡排序（相邻比较交换）、选择排序（每次选最小的放前面）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5 2 8 1 9 3 7 0` | `1 2 3 5 7 8 9` | Sample 1 |
  | `100 1 50 25 75 0` | `1 25 50 75 100` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 创建 unsigned char bits[MAX/8+1]={0}
  2. 对每个输入 x: bits[x/8] |= (1 << (x%7))
  3. 遍历 1..MAX，检查每个 bit 是否为 1
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
