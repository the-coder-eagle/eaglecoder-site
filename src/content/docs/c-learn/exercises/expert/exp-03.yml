solution_code: |
  #include <stdio.h>
  #include <stdlib.h>
  #define CAP 3
  typedef struct N{int k,v;struct N*p,*n;}N;
  N*h=0,*t=0,*c[100]={0};int sz=0;
  void mv(N*nn){if(nn==h)return;if(nn->p)nn->p->n=nn->n;if(nn->n)nn->n->p=nn->p;if(nn==t)t=nn->p;nn->n=h;nn->p=0;if(h)h->p=nn;h=nn;if(!t)t=h;}
  int get(int k){N*nn=c[k%100];while(nn&&nn->k!=k)nn=nn->n;if(!nn)return-1;mv(nn);return nn->v;}
  void put(int k,int v){N*nn=c[k%100],*p=0;while(nn&&nn->k!=k){p=nn;nn=nn->n;}if(nn){nn->v=v;mv(nn);return;}
  nn=malloc(sizeof(N));nn->k=k;nn->v=v;nn->n=c[k%100];nn->p=0;c[k%100]=nn;sz++;mv(nn);
  if(sz>CAP){N*old=t;t=t->p;t->n=0;sz--;}}
