solution_code: |
  #include <stdio.h>
  #include <ctype.h>
  #include <string.h>
  int prec(char c){if(c=='*'||c=='/')return 2;if(c=='+'||c=='-')return 1;return 0;}
  int apply(int a,int b,char op){if(op=='+')return a+b;if(op=='-')return a-b;if(op=='*')return a*b;return a/b;}
  int eval(char*e){int vs[100],vt=-1;char os[100];int ot=-1;
  for(int i=0;e[i];i++){
  if(isdigit(e[i])){int v=0;while(isdigit(e[i]))v=v*10+(e[i++]-'0');i--;vs[++vt]=v;}
  else if(e[i]=='(')os[++ot]='(';
  else if(e[i]==')'){while(ot>=0&&os[ot]!='('){int b=vs[vt--],a=vs[vt--];vs[++vt]=apply(a,b,os[ot--]);}ot--;}
  else{while(ot>=0&&prec(os[ot])>=prec(e[i])){int b=vs[vt--],a=vs[vt--];vs[++vt]=apply(a,b,os[ot--]);}os[++ot]=e[i];}}
  while(ot>=0){int b=vs[vt--],a=vs[vt--];vs[++vt]=apply(a,b,os[ot--]);}
  return vs[0];}
