description_md: |
  ## 背景故事
  
  这些题目是为想挑战自己的学习者准备的。它们涉及多个知识点的综合运用，需要你设计数据结构、选择算法、处理边界条件。做对这些题目，你就达到了能独立完成实际项目的能力水平。
  
  ## 题目描述
  
  实现简易布隆过滤器。使用 128 位的位数组和 3 个哈希函数。
  支持插入和查询（可能误报，不会漏报）。
  输入：i str=插入字符串，c str=查询（输出 maybe 或 no），q=退出
  
  **Tags: 布隆过滤器, 哈希, 概率数据结构** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `i hello\ni world\nc hello\nc foo\nq` | `maybe\nno\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 三个独立的哈希函数减少碰撞
  2. 只要有一个 bit 为 0 就一定不存在
  3. 所有 bit 都为 1 则可能存在（可能误报）
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
