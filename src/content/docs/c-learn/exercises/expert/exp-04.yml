solution_code: |
  #include <stdio.h>
  #include <string.h>
  unsigned char b[16]={0};
  unsigned h1(char*s){unsigned h=0;for(;*s;s++)h=h*31+*s;return h%128;}
  unsigned h2(char*s){unsigned h=5381;for(;*s;s++)h=((h<<5)+h)+*s;return h%128;}
  unsigned h3(char*s){unsigned h=0;for(;*s;s++)h=(h<<4)^*s;return h%128;}
  void sb(int p){b[p/8]|=(1<<(p%8));}
  int gb(int p){return(b[p/8]>>(p%8))&1;}
  void ins(char*s){sb(h1(s));sb(h2(s));sb(h3(s));}
  int q(char*s){return gb(h1(s))&&gb(h2(s))&&gb(h3(s));}
