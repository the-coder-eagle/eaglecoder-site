hints:
  - "递归处理 *：可以匹配 0 次（跳过 pattern 中的字符+*）或匹配 1 次"
  - "base case: pattern 为空时，str 必须也为空"
  - ". 匹配任意单个字符"
  - "第一步：把大问题拆解成几个小问题分别解决。"
  - "第二步：考虑时间复杂度——你的算法能处理最大规模的数据吗？"
  - "第三步：先显式处理所有边界情况，再写主逻辑。"
  - "第四步：暴力解法可能超时（TLE），选择更高效的算法。"
  - "第五步：用极端数据测试——最小值、最大值、零、负数、重复值。"
solution_code: |
  #include <stdio.h>
  int m(char*p,char*s){
  if(!*p)return!*s;
  if(p[1]=='*')return m(p+2,s)||(*s&&(p[0]=='.'||*p==*s)&&m(p,s+1));
  return *s&&(p[0]=='.'||*p==*s)&&m(p+1,s+1);
  }
