id: exp-06
title: "简易正则引擎"
difficulty: hard
tags:
  - "正则"
  - "递归"
  - "字符串"
description_md: |
  ## 背景故事
  
  这些题目是为想挑战自己的学习者准备的。它们涉及多个知识点的综合运用，需要你设计数据结构、选择算法、处理边界条件。做对这些题目，你就达到了能独立完成实际项目的能力水平。
  
  ## 题目描述
  
  实现支持 .（匹配任意字符）和 *（匹配前一个字符零次或多次）的简易正则匹配。
  输入：pattern s（空格分隔），输出：match 或 no match
  
  **Tags: 正则, 递归, 字符串** | **Difficulty: 困难**
  
  ## 关键概念
  
  ### 递归
  递归是函数自己调用自己。必须要有终止条件，否则无限递归直到栈溢出。递归三要素：终止条件、缩小规模、调用自身。
  
  ### 字符串
  C 语言没有字符串类型——字符串是字符数组，以 `\0`（空字符）结尾。`char s[100]` 最多存 99 个有效字符（留 1 个给 `\0`）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `a.b acb` | `match` | Sample 1 |
  | `a*b aaaaaab` | `match` | Sample 2 |
  | `a*b acb` | `no match` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：困难
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 递归处理 *：可以匹配 0 次（跳过 pattern 中的字符+*）或匹配 1 次
  2. base case: pattern 为空时，str 必须也为空
  3. . 匹配任意单个字符
  4. 第一步：把大问题拆解成几个小问题分别解决。
  5. 第二步：考虑时间复杂度——你的算法能处理最大规模的数据吗？
  6. 第三步：先显式处理所有边界情况，再写主逻辑。
  7. 第四步：暴力解法可能超时（TLE），选择更高效的算法。
  8. 第五步：用极端数据测试——最小值、最大值、零、负数、重复值。
  
