id: rec-06
title: "最大公约数递归"
difficulty: easy
tags:
  - "递归"
  - "GCD"
  - "欧几里得"
description_md: |
  ## 背景故事
  
  递归是一种函数调用自己的编程技巧。它优雅地解决了很多分而治之的问题：把大问题分解成小问题，直到小到可以直接解决。虽然初学者觉得递归绕脑子，但一旦理解，你会发现它是描述问题最自然的方式。
  
  ## 题目描述
  
  用递归实现欧几里得算法 `int gcd(int a, int b)`。读入两个正整数输出最大公约数。
  
  **Tags: 递归, GCD, 欧几里得** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 递归
  递归是函数自己调用自己。必须要有终止条件，否则无限递归直到栈溢出。递归三要素：终止条件、缩小规模、调用自身。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `48 18\n` | `6\n` | Sample 1 |
  | `100 25\n` | `25\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. gcd(a,0)=a
  2. gcd(a,b)=gcd(b,a%b)
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
