solution_code: |
  void dfs(int d){
      if(d==n){
          for(int i=0;i<n;i++) printf("%d ",a[i]);
          printf("\n"); return;
      }
      for(int i=1;i<=n;i++){
          if(!used[i]){ used[i]=1; a[d]=i; dfs(d+1); used[i]=0; }
      }
  }
