description_md: |
  ## 背景故事
  
  递归是一种函数调用自己的编程技巧。它优雅地解决了很多分而治之的问题：把大问题分解成小问题，直到小到可以直接解决。虽然初学者觉得递归绕脑子，但一旦理解，你会发现它是描述问题最自然的方式。
  
  ## 题目描述
  
  输入 N 和 K (1≤K≤N≤20)，输出 C(N,K) = N!/(K!(N-K)!)。用递归公式 C(n,k)=C(n-1,k-1)+C(n-1,k) 实现，不许用阶乘。
  
  **Tags: 递归, 组合, 回溯** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 递归
  递归是函数自己调用自己。必须要有终止条件，否则无限递归直到栈溢出。递归三要素：终止条件、缩小规模、调用自身。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `10 3\n` | `120\n` | Sample 1 |
  | `5 5\n` | `1\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. C(n,0)=C(n,n)=1
  2. C(n,k)=C(n-1,k-1)+C(n-1,k)
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
