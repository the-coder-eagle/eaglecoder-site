id: rec-05
title: "数字反转递归"
difficulty: easy
tags:
  - "递归"
  - "数字"
  - "反转"
description_md: |
  ## 背景故事
  
  递归是一种函数调用自己的编程技巧。它优雅地解决了很多分而治之的问题：把大问题分解成小问题，直到小到可以直接解决。虽然初学者觉得递归绕脑子，但一旦理解，你会发现它是描述问题最自然的方式。
  
  ## 题目描述
  
  用递归函数 `void reverse_digits(int n)` 逆序打印正整数的各位数字。如 1234 → 4321。
  
  **Tags: 递归, 数字, 反转** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 递归
  递归是函数自己调用自己。必须要有终止条件，否则无限递归直到栈溢出。递归三要素：终止条件、缩小规模、调用自身。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `1234\n` | `4321\n` | Sample 1 |
  | `5\n` | `5\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 先打印 n%10
  2. 再递归 n/10
  3. n<10 时直接打印返回
  4. 第一步：仔细读题，明确输入什么、输出什么。
  5. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  6. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  7. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  8. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  
