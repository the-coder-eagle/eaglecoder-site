solution_code: |
  void hanoi(int n,char f,char a,char t){
      if(n==1){ printf("%c->%c\n",f,t); steps++; return; }
      hanoi(n-1,f,t,a);
      printf("%c->%c\n",f,t); steps++;
      hanoi(n-1,a,f,t);
  }
