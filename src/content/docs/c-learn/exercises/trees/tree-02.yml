solution_code: |
  void pre(TN*r){ if(!r) return; printf("%d ",r->v); pre(r->l); pre(r->r); }
  void in(TN*r){ if(!r) return; in(r->l); printf("%d ",r->v); in(r->r); }
  void post(TN*r){ if(!r) return; post(r->l); post(r->r); printf("%d ",r->v); }
