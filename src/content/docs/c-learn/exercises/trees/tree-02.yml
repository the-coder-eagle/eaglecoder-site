id: tree-02
title: "二叉树遍历"
difficulty: medium
tags:
  - "二叉树"
  - "遍历"
  - "前中后序"
description_md: |
  ## 背景故事
  
  树结构模拟了现实世界中的层级关系。文件系统是树，公司组织架构是树，网页的 DOM 结构也是树。二叉树是最基本的树结构，理解树的遍历是理解图算法的基础。二叉搜索树（BST）更是数据库索引的核心数据结构。
  
  ## 题目描述
  
  输入 N 个节点 (层序，-1=空)，输出前序、中序、后序遍历结果。
  
  **Tags: 二叉树, 遍历, 前中后序** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `3\n1 2 3\n` | `pre: 1 2 3\nin: 2 1 3\npost: 2 3 1\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 递归: 根→左→右(前) 左→根→右(中) 左→右→根(后)
  2. 第一步：先在纸上画出你的思路或算法流程。
  3. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  4. 第三步：选择合适的数据结构——数组？指针？结构体？
  5. 第四步：用示例中的测试数据验证你的程序。
  6. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  7. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
