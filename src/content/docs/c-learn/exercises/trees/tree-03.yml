id: tree-03
title: "二叉搜索树插入"
difficulty: medium
tags:
  - "二叉树"
  - "BST"
  - "插入"
description_md: |
  ## 背景故事
  
  树结构模拟了现实世界中的层级关系。文件系统是树，公司组织架构是树，网页的 DOM 结构也是树。二叉树是最基本的树结构，理解树的遍历是理解图算法的基础。二叉搜索树（BST）更是数据库索引的核心数据结构。
  
  ## 题目描述
  
  依次读入 N 个整数，将它们插入一棵空的二叉搜索树（BST），最后中序遍历输出（升序验证）。左子树 < 根 ≤ 右子树。
  
  **Tags: 二叉树, BST, 插入** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5\n5 3 7 2 4\n` | `2 3 4 5 7\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. val < root->v 走左边
  2. val >= root->v 走右边
  3. 到 NULL 时创建新节点
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
