solution_code: |
  TN* ins(TN*r,int v){
      if(!r){ TN*n=malloc(sizeof(TN)); n->v=v; n->l=n->r=NULL; return n; }
      if(v<r->v) r->l=ins(r->l,v);
      else r->r=ins(r->r,v);
      return r;
  }
  void io(TN*r){ if(r){ io(r->l); printf("%d ",r->v); io(r->r); } }
