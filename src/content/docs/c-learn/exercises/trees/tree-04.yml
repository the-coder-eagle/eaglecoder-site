id: tree-04
title: "层序遍历"
difficulty: medium
tags:
  - "二叉树"
  - "层序"
  - "队列"
description_md: |
  ## 背景故事
  
  树结构模拟了现实世界中的层级关系。文件系统是树，公司组织架构是树，网页的 DOM 结构也是树。二叉树是最基本的树结构，理解树的遍历是理解图算法的基础。二叉搜索树（BST）更是数据库索引的核心数据结构。
  
  ## 题目描述
  
  给定一棵二叉树（按层序输入，-1 表空），输出其层序遍历结果（从上到下，每层从左到右）。
  
  **Tags: 二叉树, 层序, 队列** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 队列
  队列（Queue）是一种先进先出（FIFO）的数据结构，像排队。操作：enqueue（入队）、dequeue（出队）、front（查看队首）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `7\n1 2 3 4 5 -1 6\n` | `1 2 3 4 5 6\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 用队列辅助 BFS
  2. 先将根入队，循环弹出+左右子入队
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
