solution_code: |
  int main(){
      int n,v[100]; scanf("%d",&n);
      for(int i=0;i<n;i++) scanf("%d",&v[i]);
      for(int i=0;i<n;i++) if(v[i]!=-1) printf("%d ",v[i]);
      printf("\n"); return 0;
  }
