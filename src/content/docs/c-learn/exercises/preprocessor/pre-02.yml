id: pre-02
title: "宏定义平方"
difficulty: easy
tags:
  - "宏"
  - "define"
  - "陷阱"
description_md: |
  ## 背景故事
  
  预处理器是编译前的代码生成器。#include 不是魔法——它只是把另一个文件的内容复制过来。#define 可以定义常量、创建代码模板。理解预处理器能帮你读懂大型 C 项目的头文件组织方式。
  
  ## 题目描述
  
  分别用 `#define SQUARE1(x) x*x` 和 `#define SQUARE2(x) ((x)*(x))` 计算 `2+3` 的平方。观察两者结果差异并输出 SQUARE2(2+3) 的结果。
  
  **Tags: 宏, define, 陷阱** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 宏
  `#define` 定义宏——编译前文本替换。如 `#define PI 3.14159`。注意宏只是简单文本替换，小心运算符优先级陷阱！
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `` | `25\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 宏是文本替换
  2. SQUARE1(2+3) → 2+3*2+3 = 11
  3. SQUARE2(2+3) → ((2+3)*(2+3)) = 25
  4. 第一步：仔细读题，明确输入什么、输出什么。
  5. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  6. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  7. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  8. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  
