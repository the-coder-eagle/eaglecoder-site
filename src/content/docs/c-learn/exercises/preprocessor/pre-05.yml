  - "第四步：用示例中的测试数据验证你的程序。"
  - "提示：开发时可以用 printf 打印中间变量来调试逻辑。"
  - "效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。"
solution_code: |
  #include <stdio.h>
  #define LOG(v) printf(#v " = %d\n", v)
  int main(){
      int s; scanf("%d",&s);
      LOG(s); return 0;
  }
