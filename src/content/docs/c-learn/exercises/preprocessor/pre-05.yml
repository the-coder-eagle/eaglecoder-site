id: pre-05
title: "多行宏与字符串化"
difficulty: medium
tags:
  - "宏"
  - "字符串化"
  - "多行宏"
description_md: |
  ## 背景故事
  
  预处理器是编译前的代码生成器。#include 不是魔法——它只是把另一个文件的内容复制过来。#define 可以定义常量、创建代码模板。理解预处理器能帮你读懂大型 C 项目的头文件组织方式。
  
  ## 题目描述
  
  用 `#define LOG(var) printf(#var " = %d\n", var)` 宏来输出变量的名字和值。读取一个整数，用 LOG 宏输出。
  
  **Tags: 宏, 字符串化, 多行宏** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 宏
  `#define` 定义宏——编译前文本替换。如 `#define PI 3.14159`。注意宏只是简单文本替换，小心运算符优先级陷阱！
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `95\n` | `score = 95\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. #var 将参数转为字符串
  2. #var 和值拼接用空格
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
template_code: |
  #include <stdio.h>
  
  int main() {
      // Write your code here
      return 0;
  }
test_cases:
  - input: "95
"
    expected_output: "score = 95
"
