solution_code: |
  #include <stdio.h>
  #include <string.h>
  int main(){
      char *w[5], buf[5][50];
      for(int i=0;i<5;i++){ scanf("%s",buf[i]); w[i]=buf[i]; }
      for(int i=0;i<4;i++)
          for(int j=i+1;j<5;j++)
              if(strcmp(w[i],w[j])>0){ char *t=w[i]; w[i]=w[j]; w[j]=t; }
      for(int i=0;i<5;i++) printf("%s ",w[i]);
      printf("\n"); return 0;
  }
