solution_code: |
  #include <stdio.h>
  int main() {
      int arr[] = {1, 2, 3, 4, 5};
      int n = 5;
      int *p = arr;
      int sum = 0;
      for (int i = 0; i < n; i++)
          sum += *(p + i);
      printf("%d\n", sum);
      return 0;
  }
