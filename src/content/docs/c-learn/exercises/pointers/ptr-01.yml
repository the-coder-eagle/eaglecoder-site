description_md: |
  ## 背景故事
  
  指针是 C 语言的灵魂，也是最让初学者头疼的概念。但别怕——把指针想象成快递单号：变量是包裹里的东西，指针是快递单号，通过单号你可以找到包裹、修改包裹里的东西。掌握了指针，你才真正理解了计算机的内存模型。
  
  ## 题目描述
  
  Solve: 指针交换. Read the input/output format and examples below carefully.
  
  **Tags: 指针, 函数, 解引用** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 指针
  指针是 C 语言的灵魂——它存储另一个变量的内存地址。`&x` 获取 x 的地址，`*p` 解引用（访问 p 指向的值）。可以理解为：指针 = 快递单号，*指针 = 打开包裹。
  
  ### 函数
  函数是一段有名字、可复用的代码。定义：`返回类型 函数名(参数) { ... return 值; }`。调用：`函数名(参数);`。
  
  ### 解引用
  解引用（`*p`）就是通过指针访问它指向的那个变量的值。如果 `p = &x`，那么 `*p` 和 `x` 完全等价——修改 `*p` 等于修改 `x`。
  
