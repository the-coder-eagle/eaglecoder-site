id: bit-06
title: "交换奇偶位"
difficulty: medium
tags:
  - "位运算"
  - "交换"
  - "技巧"
description_md: |
  ## 背景故事
  
  位运算让你直接操控二进制位——这是最底层的操作。权限系统用位掩码（一个整数表示多种权限），加密算法用位移和异或，图形处理用位操作混合颜色。理解位运算能让你写出更快、更省内存的代码。
  
  ## 题目描述
  
  读入一个无符号整数，交换其二进制表示的奇数位和偶数位（最低位=0 位是偶数位）。输出交换后的值。
  
  **Tags: 位运算, 交换, 技巧** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 位运算
  位运算直接操控二进制位。`&`（与）、`|`（或）、`^`（异或）、`~`（取反）、`<<`（左移×2）、`>>`（右移÷2）。位运算比算术运算快很多。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5\n` | `10\n` | Sample 1 |
  | `10\n` | `5\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 偶数位掩码: 0xAAAAAAAA
  2. 奇数位掩码: 0x55555555
  3. ((n&0xAA)>>1) | ((n&0x55)<<1)
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
