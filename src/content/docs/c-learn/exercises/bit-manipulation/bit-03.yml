id: bit-03
title: "判断 2 的幂"
difficulty: easy
tags:
  - "位运算"
  - "2的幂"
  - "技巧"
description_md: |
  ## 背景故事
  
  位运算让你直接操控二进制位——这是最底层的操作。权限系统用位掩码（一个整数表示多种权限），加密算法用位移和异或，图形处理用位操作混合颜色。理解位运算能让你写出更快、更省内存的代码。
  
  ## 题目描述
  
  读入一个正整数 n，用位运算技巧判断 n 是否为 2 的幂。输出 YES 或 NO。
  
  **Tags: 位运算, 2的幂, 技巧** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 位运算
  位运算直接操控二进制位。`&`（与）、`|`（或）、`^`（异或）、`~`（取反）、`<<`（左移×2）、`>>`（右移÷2）。位运算比算术运算快很多。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `16\n` | `YES\n` | Sample 1 |
  | `18\n` | `NO\n` | Sample 2 |
  | `1\n` | `YES\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 2 的幂的二进制只有 1 个 1
  2. n & (n-1) 消去最低位的 1
  3. n>0 && (n&(n-1))==0
  4. 第一步：仔细读题，明确输入什么、输出什么。
  5. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  6. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  7. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  8. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  
