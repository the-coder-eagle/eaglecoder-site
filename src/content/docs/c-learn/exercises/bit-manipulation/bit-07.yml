id: bit-07
title: "反转二进制位"
difficulty: hard
tags:
  - "位运算"
  - "反转"
  - "循环"
description_md: |
  ## 背景故事
  
  位运算让你直接操控二进制位——这是最底层的操作。权限系统用位掩码（一个整数表示多种权限），加密算法用位移和异或，图形处理用位操作混合颜色。理解位运算能让你写出更快、更省内存的代码。
  
  ## 题目描述
  
  读入一个无符号 32 位整数，反转其所有二进制位（第 0 位与第 31 位交换，以此类推），输出结果。
  
  **Tags: 位运算, 反转, 循环** | **Difficulty: 困难**
  
  ## 关键概念
  
  ### 位运算
  位运算直接操控二进制位。`&`（与）、`|`（或）、`^`（异或）、`~`（取反）、`<<`（左移×2）、`>>`（右移÷2）。位运算比算术运算快很多。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `1\n` | `2147483648\n` | Sample 1 |
  | `2147483648\n` | `1\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：困难
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 循环 32 次
  2. result = (result<<1) | (n&1); n >>= 1
  3. 第一步：把大问题拆解成几个小问题分别解决。
  4. 第二步：考虑时间复杂度——你的算法能处理最大规模的数据吗？
  5. 第三步：先显式处理所有边界情况，再写主逻辑。
  6. 第四步：暴力解法可能超时（TLE），选择更高效的算法。
  7. 第五步：用极端数据测试——最小值、最大值、零、负数、重复值。
  8. 数据结构提示：选择正确的数据结构可以大幅降低代码复杂度。
  
