id: bit-05
title: "位掩码权限"
difficulty: medium
tags:
  - "位运算"
  - "掩码"
  - "权限"
description_md: |
  ## 背景故事
  
  位运算让你直接操控二进制位——这是最底层的操作。权限系统用位掩码（一个整数表示多种权限），加密算法用位移和异或，图形处理用位操作混合颜色。理解位运算能让你写出更快、更省内存的代码。
  
  ## 题目描述
  
  用位掩码实现权限系统。定义 READ=1, WRITE=2, EXEC=4。读入一个 0-7 的数字，输出具有的权限列表。如 5 → 'Read Exec'。
  
  **Tags: 位运算, 掩码, 权限** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 位运算
  位运算直接操控二进制位。`&`（与）、`|`（或）、`^`（异或）、`~`（取反）、`<<`（左移×2）、`>>`（右移÷2）。位运算比算术运算快很多。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5\n` | `Read Exec\n` | Sample 1 |
  | `7\n` | `Read Write Exec\n` | Sample 2 |
  | `2\n` | `Write\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. perm & READ 检测读权限
  2. 按位检测 READ → WRITE → EXEC
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
