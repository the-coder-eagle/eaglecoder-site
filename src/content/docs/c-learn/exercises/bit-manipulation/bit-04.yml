id: bit-04
title: "二进制中 1 的个数"
difficulty: easy
tags:
  - "位运算"
  - "统计"
  - "popcount"
description_md: |
  ## 背景故事
  
  位运算让你直接操控二进制位——这是最底层的操作。权限系统用位掩码（一个整数表示多种权限），加密算法用位移和异或，图形处理用位操作混合颜色。理解位运算能让你写出更快、更省内存的代码。
  
  ## 题目描述
  
  Solve: 二进制中 1 的个数. Read the input/output format and examples below carefully.
  
  **Tags: 位运算, 统计, popcount** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 位运算
  位运算直接操控二进制位。`&`（与）、`|`（或）、`^`（异或）、`~`（取反）、`<<`（左移×2）、`>>`（右移÷2）。位运算比算术运算快很多。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `13\n` | `3\n` | Sample 1 |
  | `255\n` | `8\n` | Sample 2 |
  | `0\n` | `0\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. while(n) { count += n&1; n >>= 1; }
  2. 或 while(n) { n &= n-1; count++; }
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
