id: loop-10
title: "数字统计"
difficulty: easy
tags:
  - "循环"
  - "数字分解"
  - "统计"
description_md: |
  ## 背景故事
  
  循环是计算机最强大的能力之一。人类做重复劳动会累，但计算机可以在几毫秒内完成数百万次重复操作。从计算 1 到 100 万的和，到处理成千上万条用户数据，循环让编程变得真正有用。掌握循环是区分会写代码和能解决问题的分水岭。
  
  ## 题目描述
  
  输入 N 个整数 (N≤100)，统计其中正数、负数和零的个数。
  
  **Tags: 循环, 数字分解, 统计** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5\n3 -1 0 8 -2\n` | `+:2 -:2 0:1\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. if (x>0) pos++
  2. else if (x<0) neg++
  3. else zero++
  4. 第一步：仔细读题，明确输入什么、输出什么。
  5. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  6. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  7. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  8. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  
template_code: |
  #include <stdio.h>
  
  int main() {
      // Write your code here
      return 0;
  }
test_cases:
  - input: "5
3 -1 0 8 -2
"
    expected_output: "+:2 -:2 0:1
"
hints:
  - "if (x>0) pos++"
  - "else if (x<0) neg++"
  - "else zero++"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
solution_code: |
  #include <stdio.h>
  int main() {
      int n,x,p=0,ng=0,z=0;
      scanf("%d",&n);
      while(n--){ scanf("%d",&x); if(x>0)p++; else if(x<0)ng++; else z++; }
      printf("+:%d -:%d 0:%d\n",p,ng,z);
      return 0;
  }
