hints:
  - "检查是否有 2~sqrt(n) 的因子"
  - "1 不是素数"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  #include <stdio.h>
  #include <math.h>
  int main() {
      int n; scanf("%d", &n);
      if(n<2){ printf("NO\n"); return 0; }
      for(int i=2;i*i<=n;i++)
          if(n%i==0){ printf("NO\n"); return 0; }
      printf("YES\n"); return 0;
  }
