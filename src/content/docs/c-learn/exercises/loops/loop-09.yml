id: loop-09
title: "打印菱形"
difficulty: easy
tags:
  - "嵌套循环"
  - "图案打印"
description_md: |
  ## 背景故事
  
  循环是计算机最强大的能力之一。人类做重复劳动会累，但计算机可以在几毫秒内完成数百万次重复操作。从计算 1 到 100 万的和，到处理成千上万条用户数据，循环让编程变得真正有用。掌握循环是区分会写代码和能解决问题的分水岭。
  
  ## 题目描述
  
  输入奇数 N (3≤N≤19)，输出 N 行由 * 组成的菱形。
  
  **Tags: 嵌套循环, 图案打印** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 嵌套循环
  嵌套循环是循环里面套循环。外层跑 1 次，内层跑完一整轮。常用于打印矩阵、乘法表等二维问题。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `3\n` | `*\n***\n *\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 分上半和下半
  2. 每行空格数 = |n/2 - 行号|
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
template_code: |
  #include <stdio.h>
  
  int main() {
      // Write your code here
      return 0;
  }
test_cases:
  - input: "3
"
    expected_output: " *
***
 *
"
hints:
  - "分上半和下半"
  - "每行空格数 = |n/2 - 行号|"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  #include <stdio.h>
  #include <stdlib.h>
  int main() {
      int n; scanf("%d", &n);
      for(int i=0;i<n;i++){
          int sp=abs(n/2-i), st=n-2*sp;
          for(int j=0;j<sp;j++) printf(" ");
          for(int j=0;j<st;j++) printf("*");
          printf("\n");
      }
      return 0;
  }
