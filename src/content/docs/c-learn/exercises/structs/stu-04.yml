solution_code: |
  int tos(Time t){ return t.h*3600+t.m*60+t.s; }
  int main(){
      Time t1,t2;
      scanf("%d:%d:%d %d:%d:%d",&t1.h,&t1.m,&t1.s,&t2.h,&t2.m,&t2.s);
      printf("%d\n",tos(t2)-tos(t1));
      return 0;
  }
