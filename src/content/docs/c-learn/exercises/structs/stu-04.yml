id: stu-04
title: "时间结构体差值"
difficulty: medium
tags:
  - "struct"
  - "时间"
  - "差值"
description_md: |
  ## 背景故事
  
  结构体让你可以自定义数据类型。现实世界中的事物往往是多种属性的组合——一个学生有姓名、学号、成绩；一本书有书名、作者、价格。结构体让你可以把这些相关数据打包在一起，是面向对象编程思想的前身。
  
  ## 题目描述
  
  定义 Time 结构体（hour, minute, second）。读入两个时刻 t1 和 t2（同一天，t2≥t1），计算相差的秒数。
  
  **Tags: struct, 时间, 差值** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `08:30:00\n09:15:30\n` | `2730\n` | Sample 1 |
  | `12:00:00\n12:00:05\n` | `5\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 全部转为秒数比较
  2. diff_sec = sec2 - sec1
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
