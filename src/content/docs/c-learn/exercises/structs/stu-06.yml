solution_code: |
  int main(){
      int n,mxi=0; Score ss[50];
      scanf("%d",&n);
      for(int i=0;i<n;i++){
          scanf("%s %d %d %d",ss[i].n,&ss[i].c,&ss[i].m,&ss[i].e);
          ss[i].t=ss[i].c+ss[i].m+ss[i].e;
          if(ss[i].t>ss[mxi].t) mxi=i;
      }
      printf("%s %d %d %d %d\n",ss[mxi].n,ss[mxi].c,ss[mxi].m,ss[mxi].e,ss[mxi].t);
      return 0;
  }
