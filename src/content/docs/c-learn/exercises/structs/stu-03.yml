solution_code: |
  int main(){
      int n; scanf("%d",&n);
      Product ps[50];
      for(int i=0;i<n;i++) scanf("%s %d",ps[i].name,&ps[i].price);
      for(int i=0;i<n-1;i++)
          for(int j=0;j<n-1-i;j++)
              if(ps[j].price<ps[j+1].price){ Product t=ps[j]; ps[j]=ps[j+1]; ps[j+1]=t; }
      for(int i=0;i<n;i++) printf("%s %d ",ps[i].name,ps[i].price);
      printf("\n"); return 0;
  }
