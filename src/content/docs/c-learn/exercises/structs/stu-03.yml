id: stu-03
title: "结构体数组排序"
difficulty: medium
tags:
  - "struct"
  - "数组"
  - "排序"
description_md: |
  ## 背景故事
  
  结构体让你可以自定义数据类型。现实世界中的事物往往是多种属性的组合——一个学生有姓名、学号、成绩；一本书有书名、作者、价格。结构体让你可以把这些相关数据打包在一起，是面向对象编程思想的前身。
  
  ## 题目描述
  
  定义 Product 结构体（name[20], price(int)）。读入 N 个商品，按价格降序输出商品名和价格。
  
  **Tags: struct, 数组, 排序** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 数组
  数组是一组相同类型的变量，连续存储在内存中。声明：`int arr[10];`。访问：`arr[0]` 是第一个，`arr[9]` 是最后一个。索引从 0 开始！
  
  ### 排序
  排序是把数据从小到大（或从大到小）排列。常见排序算法：冒泡排序（相邻比较交换）、选择排序（每次选最小的放前面）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `3\napple 5 banana 2 cherry 8\n` | `cherry 8 apple 5 banana 2\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 冒泡排序比较 price
  2. 交换整个结构体
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
