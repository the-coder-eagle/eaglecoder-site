id: stu-02
title: "矩形结构体"
difficulty: easy
tags:
  - "struct"
  - "面积"
  - "周长"
description_md: |
  ## 背景故事
  
  结构体让你可以自定义数据类型。现实世界中的事物往往是多种属性的组合——一个学生有姓名、学号、成绩；一本书有书名、作者、价格。结构体让你可以把这些相关数据打包在一起，是面向对象编程思想的前身。
  
  ## 题目描述
  
  定义 Rect 结构体（width, height, 都是 int）。读入宽高，输出面积和周长。
  
  **Tags: struct, 面积, 周长** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5 3\n` | `area:15 peri:16\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 面积 = w × h
  2. 周长 = 2 × (w + h)
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
template_code: |
  #include <stdio.h>
  
  int main() {
      // Write your code here
      return 0;
  }
test_cases:
  - input: "5 3
"
    expected_output: "area:15 peri:16
"
hints:
  - "面积 = w × h"
  - "周长 = 2 × (w + h)"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  int main(){
      Rect r; scanf("%d %d",&r.w,&r.h);
      printf("area:%d peri:%d\n",r.w*r.h,2*(r.w+r.h));
      return 0;
  }
