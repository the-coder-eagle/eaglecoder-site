hints:
  - "头插: newNode->next = head; head = newNode"
  - "头插会反转顺序"
  - "第一步：先在纸上画出你的思路或算法流程。"
  - "第二步：确定边界情况——空输入、最大值、负数等怎么处理？"
  - "第三步：选择合适的数据结构——数组？指针？结构体？"
  - "第四步：用示例中的测试数据验证你的程序。"
  - "提示：开发时可以用 printf 打印中间变量来调试逻辑。"
  - "效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。"
solution_code: |
  int main(){
      int n,x; Node *h=NULL;
      scanf("%d",&n);
      for(int i=0;i<n;i++){
          scanf("%d",&x);
          Node *p=malloc(sizeof(Node)); p->data=x; p->next=h; h=p;
      }
      for(Node *c=h;c;c=c->next) printf("%d ",c->data);
      printf("\n"); return 0;
  }
