"
hints:
  - "遍历筛选 year > y"
  - "如果没有匹配的书输出 NONE"
  - "第一步：把大问题拆解成几个小问题分别解决。"
  - "第二步：考虑时间复杂度——你的算法能处理最大规模的数据吗？"
  - "第三步：先显式处理所有边界情况，再写主逻辑。"
  - "第四步：暴力解法可能超时（TLE），选择更高效的算法。"
  - "第五步：用极端数据测试——最小值、最大值、零、负数、重复值。"
  - "数据结构提示：选择正确的数据结构可以大幅降低代码复杂度。"
solution_code: |
  int main(){
      int n,y,f=0; Book bs[100];
      scanf("%d",&n);
      for(int i=0;i<n;i++) scanf("%s %s %d %d",bs[i].title,bs[i].author,&bs[i].year,&bs[i].pages);
      scanf("%d",&y);
      for(int i=0;i<n;i++) if(bs[i].year>y){ printf("%s ",bs[i].title); f=1; }
      if(!f) printf("NONE");
      printf("\n"); return 0;
  }
