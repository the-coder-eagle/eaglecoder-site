id: enu-02
title: "HTTP 状态码枚举"
difficulty: easy
tags:
  - "enum"
  - "映射"
  - "HTTP"
description_md: |
  ## 背景故事
  
  枚举和联合体是 C 语言中容易被忽视但非常有用的特性。枚举让代码更可读（用 RED 代替 1），联合体让你用不同方式解释同一块内存。理解它们能帮你读懂操作系统源码和网络协议实现。
  
  ## 题目描述
  
  定义 enum HttpStatus {OK=200, NOT_FOUND=404, SERVER_ERR=500}。输入状态码，输出对应的描述短语。
  
  **Tags: enum, 映射, HTTP** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `200\n` | `OK\n` | Sample 1 |
  | `404\n` | `Not Found\n` | Sample 2 |
  | `500\n` | `Internal Server Error\n` | Sample 3 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 用 if/else 或 switch 映射
  2. enum 本质是 int
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
template_code: |
  #include <stdio.h>
  
  int main() {
      // Write your code here
      return 0;
  }
test_cases:
