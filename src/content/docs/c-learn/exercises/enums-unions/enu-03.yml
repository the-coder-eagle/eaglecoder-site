id: enu-03
title: "联合体解析 IP"
difficulty: medium
tags:
  - "union"
  - "IP地址"
  - "字节"
description_md: |
  ## 背景故事
  
  枚举和联合体是 C 语言中容易被忽视但非常有用的特性。枚举让代码更可读（用 RED 代替 1），联合体让你用不同方式解释同一块内存。理解它们能帮你读懂操作系统源码和网络协议实现。
  
  ## 题目描述
  
  定义 union IPAddr { unsigned int ip; unsigned char bytes[4]; }。读入一个无符号整数 IP 地址，分别输出其 4 个字节的值。
  
  **Tags: union, IP地址, 字节** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `16909060\n` | `1.2.3.4\n` | Sample 1 |
  | `167772161\n` | `10.0.0.1\n` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. union 成员共享内存
  2. bytes[0] 是低字节（小端）
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
