  - "第二步：确定边界情况——空输入、最大值、负数等怎么处理？"
  - "第三步：选择合适的数据结构——数组？指针？结构体？"
  - "第四步：用示例中的测试数据验证你的程序。"
  - "提示：开发时可以用 printf 打印中间变量来调试逻辑。"
solution_code: |
  int main(){
      Student ss[3], rr[3]; float t=0;
      for(int i=0;i<3;i++) scanf("%d %f",&ss[i].id,&ss[i].score);
      FILE *f=fopen("student.dat","wb");
      fwrite(ss,sizeof(Student),3,f); fclose(f);
      f=fopen("student.dat","rb");
      fread(rr,sizeof(Student),3,f); fclose(f);
      for(int i=0;i<3;i++) t+=rr[i].score;
      printf("%.1f\n",t); return 0;
  }
