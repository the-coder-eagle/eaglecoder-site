test_cases:
  - input: ""
    expected_output: "4
"
hints:
  - "逐个字符读取 fgetc"
  - "遇到空格则单词计数+1"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  int main(){
      FILE *f=fopen("input.txt","r");
      if(!f){ printf("Error\n"); return 1; }
      int c, w=0, in=0;
      while((c=fgetc(f))!=EOF){
          if(c==' '||c=='\n'){ if(in){ w++; in=0; } }
          else in=1;
      }
      if(in) w++;
      printf("%d\n",w); fclose(f);
      return 0;
  }
