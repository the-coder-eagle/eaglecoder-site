id: fio-02
title: "读取文件并统计"
difficulty: easy
tags:
  - "文件"
  - "fgetc"
  - "统计"
description_md: |
  ## 背景故事
  
  文件 I/O 让程序拥有了记忆力。没有文件操作，程序每次运行都从零开始——用户数据、游戏存档、配置文件全部消失。学会文件读写，你的程序才能真正保存和加载数据，从一个演示变成工具。
  
  ## 题目描述
  
  读取文件 input.txt 的内容（仅字母和空格），统计其中的单词数（以空格分隔）。输出单词数量。
  
  **Tags: 文件, fgetc, 统计** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 文件
  文件 I/O 让程序能保存数据。核心函数：`fopen()` 打开、`fprintf()`/`fscanf()` 读写、`fclose()` 关闭（必须关！）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `` | `4\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 逐个字符读取 fgetc
  2. 遇到空格则单词计数+1
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
template_code: |
  #include <stdio.h>
  
