solution_code: |
  int main(){
      FILE *f=fopen("scores.csv","r");
      if(!f){ printf("Error\n"); return 1; }
      char nm[50],bn[50]; int sc,c=0,s=0,mx=-1;
      fscanf(f,"%[^\n]\n",nm);
      while(fscanf(f,"%[^,],%d\n",nm,&sc)==2){
          s+=sc; c++;
          if(sc>mx){ mx=sc; sprintf(bn,"%s",nm); }
      }
      printf("%.1f %s\n",s*1.0/c,bn);
      fclose(f); return 0;
  }
