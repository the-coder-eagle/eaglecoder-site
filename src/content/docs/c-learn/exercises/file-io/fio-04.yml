id: fio-04
title: "CSV 成绩统计"
difficulty: medium
tags:
  - "文件"
  - "fscanf"
  - "统计"
description_md: |
  ## 背景故事
  
  文件 I/O 让程序拥有了记忆力。没有文件操作，程序每次运行都从零开始——用户数据、游戏存档、配置文件全部消失。学会文件读写，你的程序才能真正保存和加载数据，从一个演示变成工具。
  
  ## 题目描述
  
  读取 scores.csv 文件，格式为每行: 姓名,分数。第一行是标题行需跳过。输出平均分（保留 1 位小数）和最高分者的姓名。
  
  **Tags: 文件, fscanf, 统计** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 文件
  文件 I/O 让程序能保存数据。核心函数：`fopen()` 打开、`fprintf()`/`fscanf()` 读写、`fclose()` 关闭（必须关！）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `` | `85.5 Alice\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. fscanf(fp, "%[^,],%d\n", ...)
  2. 判断返回值避免空行
  3. 第一步：先在纸上画出你的思路或算法流程。
  4. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  5. 第三步：选择合适的数据结构——数组？指针？结构体？
  6. 第四步：用示例中的测试数据验证你的程序。
  7. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  8. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
