"
hints:
  - "while ((ch=fgetc(in)) != EOF) fputc(ch, out)"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  int main(){
      FILE *in=fopen("src.txt","r"),*out=fopen("dst.txt","w");
      if(!in||!out){ printf("Error\n"); return 1; }
      int c; while((c=fgetc(in))!=EOF) fputc(c,out);
      fclose(in); fclose(out);
      printf("Copied\n"); return 0;
  }
