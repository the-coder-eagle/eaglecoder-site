solution_code: |
  #include <stdio.h>
  int main() {
      int n,a[100],t; scanf("%d",&n);
      for(int i=0;i<n;i++) scanf("%d",&a[i]);
      scanf("%d",&t);
      int l=0,r=n-1;
      while(l<=r){ int m=l+(r-l)/2; if(a[m]==t){ printf("%d\n",m); return 0; } else if(a[m]<t) l=m+1; else r=m-1; }
      printf("-1\n"); return 0;
  }
