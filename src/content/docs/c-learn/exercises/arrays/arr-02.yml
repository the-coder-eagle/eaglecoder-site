hints:
  - "记录 max_val 和 max_idx"
  - "遍历比较"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
  - "测试技巧：尝试不同的输入值验证你的程序是否正确。"
solution_code: |
  #include <stdio.h>
  int main() {
      int n,a[100]; scanf("%d",&n);
      for(int i=0;i<n;i++) scanf("%d",&a[i]);
      int mx=0;
      for(int i=1;i<n;i++) if(a[i]>a[mx]) mx=i;
      printf("%d %d\n",a[mx],mx); return 0;
  }
