id: arr-06
title: "矩阵转置"
difficulty: medium
tags:
  - "二维数组"
  - "矩阵"
description_md: |
  ## 背景故事
  
  数组让你可以同时处理大量数据。想象一下：不用数组的话，存储一个班级 50 个学生的成绩需要 50 个变量；用数组，只需要一行代码。数组是所有数据结构的基础——字符串是字符数组，链表是结构体加指针的链式数组。
  
  ## 题目描述
  
  Solve: 矩阵转置. Read the input/output format and examples below carefully.
  
  **Tags: 二维数组, 矩阵** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `2 3\n1 2 3\n4 5 6\n` | `1 4\n2 5\n3 6\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 输出 a[j][i] 而非 a[i][j]
  2. 第一步：先在纸上画出你的思路或算法流程。
  3. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  4. 第三步：选择合适的数据结构——数组？指针？结构体？
  5. 第四步：用示例中的测试数据验证你的程序。
  6. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  7. 效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。
  
