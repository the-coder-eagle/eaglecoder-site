  - "第二步：确定边界情况——空输入、最大值、负数等怎么处理？"
  - "第三步：选择合适的数据结构——数组？指针？结构体？"
  - "第四步：用示例中的测试数据验证你的程序。"
  - "提示：开发时可以用 printf 打印中间变量来调试逻辑。"
  - "效率提示：注意算法的时间复杂度，避免不必要的嵌套循环。"
solution_code: |
  #include <stdio.h>
  int main() {
      int n,m,a[10][10];
      scanf("%d %d",&n,&m);
      for(int i=0;i<n;i++) for(int j=0;j<m;j++) scanf("%d",&a[i][j]);
      for(int j=0;j<m;j++){ for(int i=0;i<n;i++) printf("%d ",a[i][j]); printf("\n"); }
      return 0;
  }
