solution_code: |
  #include <stdio.h>
  #include <stdlib.h>
  typedef struct N{double v;struct N*n;}N;
  void bucket_sort(double a[],int n){
      N*b[10]={0};
      for(int i=0;i<n;i++){int idx=(int)a[i];if(idx>=10)idx=9;
          N*nd=malloc(sizeof(N));nd->v=a[i];nd->n=0;
          if(!b[idx]||a[i]<=b[idx]->v){nd->n=b[idx];b[idx]=nd;}
          else{N*c=b[idx];while(c->n&&c->n->v<a[i])c=c->n;nd->n=c->n;c->n=nd;}}
      int k=0;
      for(int i=0;i<10;i++)for(N*c=b[i];c;c=c->n)a[k++]=c->v;
  }
