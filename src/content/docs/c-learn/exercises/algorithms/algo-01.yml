solution_code: |
  #include <stdio.h>
  
  void selection_sort(int arr[], int n) {
      for (int i = 0; i < n - 1; i++) {
          int min_idx = i;
          for (int j = i + 1; j < n; j++)
              if (arr[j] < arr[min_idx]) min_idx = j;
          int t = arr[i]; arr[i] = arr[min_idx]; arr[min_idx] = t;
      }
  }
  
  int main() {
      int arr[100], n = 0, x;
      while (scanf("%d", &x) && x != 0) arr[n++] = x;
      selection_sort(arr, n);
      for (int i = 0; i < n; i++) printf("%d ", arr[i]);
      return 0;
  }
