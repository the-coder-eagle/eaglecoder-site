  - "统计每个值出现的次数"
  - "按顺序输出每个值 count[i] 次"
  - "第一步：仔细读题，明确输入什么、输出什么。"
  - "第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。"
  - "第三步：用 scanf 读入数据，处理后用 printf 输出结果。"
  - "常见错误：scanf 中忘记写 & 符号，如 scanf('%d', &x) 不能写成 scanf('%d', x)。"
  - "常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。"
solution_code: |
  #include <stdio.h>
  void counting_sort(int arr[],int n){int c[101]={0};for(int i=0;i<n;i++)c[arr[i]]++;int k=0;for(int i=0;i<=100;i++)for(int j=0;j<c[i];j++)arr[k++]=i;}
