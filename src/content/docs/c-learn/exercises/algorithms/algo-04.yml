solution_code: |
  #include <stdio.h>
  
  int majority_element(int arr[], int n) {
      int candidate = arr[0], count = 1;
      for (int i = 1; i < n; i++) {
          if (count == 0) { candidate = arr[i]; count = 1; }
          else if (arr[i] == candidate) count++;
          else count--;
      }
      return candidate;
  }
  
  int main() {
      int arr[1000], n = 0, x;
      while (scanf("%d", &x) != EOF) arr[n++] = x;
      printf("%d", majority_element(arr, n));
      return 0;
  }
