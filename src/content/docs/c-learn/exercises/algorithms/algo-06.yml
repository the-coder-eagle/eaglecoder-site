solution_code: |
  #include <stdio.h>
  void spiral_print(int m[][50], int n, int col) {
      int top=0,bot=n-1,le=0,ri=col-1;
      while(top<=bot&&le<=ri){
          for(int j=le;j<=ri;j++)printf("%d ",m[top][j]);top++;
          for(int i=top;i<=bot;i++)printf("%d ",m[i][ri]);ri--;
          if(top<=bot){for(int j=ri;j>=le;j--)printf("%d ",m[bot][j]);bot--;}
          if(le<=ri){for(int i=bot;i>=top;i--)printf("%d ",m[i][le]);le++;}
      }
  }
