solution_code: |
  #include <stdio.h>
  #include <stdlib.h>
  
  typedef struct { int start, end; } Interval;
  int cmp(const void *a, const void *b) { return ((Interval*)a)->start - ((Interval*)b)->start; }
  
  int merge_intervals(Interval arr[], int n) {
      qsort(arr, n, sizeof(Interval), cmp);
      int count = 0, cur_end = arr[0].end;
      for (int i = 1; i < n; i++) {
          if (arr[i].start <= cur_end) {
              if (arr[i].end > cur_end) cur_end = arr[i].end;
          } else { count++; cur_end = arr[i].end; }
      }
      return count + 1;
  }
  
  int main() {
      int n; scanf("%d", &n);
      Interval arr[100];
      for (int i = 0; i < n; i++) scanf("%d %d", &arr[i].start, &arr[i].end);
      printf("%d", merge_intervals(arr, n));
      return 0;
  }
