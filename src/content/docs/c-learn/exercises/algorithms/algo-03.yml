solution_code: |
  #include <stdio.h>
  
  int first_occurrence(int arr[], int n, int target) {
      int l = 0, r = n - 1, ans = -1;
      while (l <= r) {
          int mid = l + (r - l) / 2;
          if (arr[mid] >= target) { r = mid - 1; if (arr[mid] == target) ans = mid; }
          else l = mid + 1;
      }
      return ans;
  }
  
  int main() {
      int arr[100], n = 0, x, target;
      while (scanf("%d", &x) && x != -1) arr[n++] = x;
      scanf("%d", &target);
      printf("%d", first_occurrence(arr, n, target));
      return 0;
  }
