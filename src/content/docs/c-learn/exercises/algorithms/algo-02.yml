solution_code: |
  #include <stdio.h>
  
  void insertion_sort(int arr[], int n) {
      for (int i = 1; i < n; i++) {
          int key = arr[i], j = i - 1;
          while (j >= 0 && arr[j] > key) { arr[j+1] = arr[j]; j--; }
          arr[j+1] = key;
      }
  }
  
  int main() {
      int arr[100], n = 0, x;
      while (scanf("%d", &x) && x != 0) arr[n++] = x;
      insertion_sort(arr, n);
      for (int i = 0; i < n; i++) printf("%d ", arr[i]);
      return 0;
  }
