description_md: |
  ## 背景故事
  
  算法是编程的核心竞争力。同样的功能，好的算法比差的算法快几百倍甚至几万倍。这些题目覆盖了经典算法思想：贪心、分治、模拟、搜索。理解这些思想后，你可以解决任何看起来没见过的题目。
  
  ## 题目描述
  
  Solve: 插入排序. Read the input/output format and examples below carefully.
  
  **Tags: 排序, 算法, 数组** | **Difficulty: 简单**
  
  ## 关键概念
  
  ### 排序
  排序是把数据从小到大（或从大到小）排列。常见排序算法：冒泡排序（相邻比较交换）、选择排序（每次选最小的放前面）。
  
  ### 数组
  数组是一组相同类型的变量，连续存储在内存中。声明：`int arr[10];`。访问：`arr[0]` 是第一个，`arr[9]` 是最后一个。索引从 0 开始！
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `3 1 4 1 5 9 0` | `1 1 3 4 5 9` | Sample 1 |
  | `2 1 0` | `1 2` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：简单
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 从 i=1 开始，将 arr[i] 插入到 arr[0..i-1] 的正确位置
  2. 内层循环将元素后移
  3. 第一步：仔细读题，明确输入什么、输出什么。
  4. 第二步：声明变量，选对类型——整数用 int，小数用 float 或 double。
  5. 第三步：用 scanf 读入数据，处理后用 printf 输出结果。
  6. 常见错误：scanf 中忘记写 & 符号，如 scanf("%d", &x) 不能写成 scanf("%d", x)。
  7. 常见错误：判断相等用 ==（两个等号），一个等号 = 是赋值。
  8. 测试技巧：尝试不同的输入值验证你的程序是否正确。
  
