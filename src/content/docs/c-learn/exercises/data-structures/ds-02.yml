solution_code: |
  #include <stdio.h>
  #define CAP 5
  typedef struct{int d[CAP];int f,r,s;}CQ;
  void init(CQ*q){q->f=0;q->r=-1;q->s=0;}
  int full(CQ*q){return q->s==CAP;}
  int empty(CQ*q){return q->s==0;}
  void enq(CQ*q,int v){if(!full(q)){q->r=(q->r+1)%CAP;q->d[q->r]=v;q->s++;}}
  int deq(CQ*q){if(empty(q))return-1;int v=q->d[q->f];q->f=(q->f+1)%CAP;q->s--;return v;}
