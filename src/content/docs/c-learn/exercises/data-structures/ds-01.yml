solution_code: |
  #include <stdio.h>
  #include <stdlib.h>
  typedef struct Node{int data;struct Node*prev,*next;}Node;
  Node*head=0,*tail=0;
  void insert_head(int v){Node*n=malloc(sizeof(Node));n->data=v;n->prev=0;n->next=head;if(head)head->prev=n;else tail=n;head=n;}
  void insert_tail(int v){Node*n=malloc(sizeof(Node));n->data=v;n->next=0;n->prev=tail;if(tail)tail->next=n;else head=n;tail=n;}
  void print_forward(){for(Node*c=head;c;c=c->next)printf("%d ",c->data);printf("\n");}
  void print_backward(){for(Node*c=tail;c;c=c->prev)printf("%d ",c->data);printf("\n");}
  int main(){char c;int v;while(scanf(" %c",&c)&&c!='q'){if(c=='h'){scanf("%d",&v);insert_head(v);}else if(c=='t'){scanf("%d",&v);insert_tail(v);}else if(c=='p')print_forward();else if(c=='r')print_backward();}return 0;}
