solution_code: |
  #include <stdio.h>
  #define MAX 1000
  int p[MAX],r[MAX];
  void init(int n){for(int i=1;i<=n;i++){p[i]=i;r[i]=0;}}
  int find(int x){if(p[x]!=x)p[x]=find(p[x]);return p[x];}
  void un(int x,int y){int rx=find(x),ry=find(y);if(rx==ry)return;if(r[rx]<r[ry])p[rx]=ry;else if(r[rx]>r[ry])p[ry]=rx;else{p[ry]=rx;r[rx]++;}}
