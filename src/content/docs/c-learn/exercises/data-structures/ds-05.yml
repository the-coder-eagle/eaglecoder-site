description_md: |
  ## 背景故事
  
  数据结构决定了你的程序能跑多快。HashMap 让查找变成 O(1)，堆让取最值变成 O(log n)，并查集让连通性判断快到惊人。理解这些结构的设计思想，你才能在实际项目中做出正确的技术选型。
  
  ## 题目描述
  
  实现并查集（Union-Find），支持路径压缩和按秩合并。
  输入：先输入 n（元素数 1..n），然后 m 个操作。
  操作：u a b=合并a和b的集合，s a b=查询a和b是否在同一集合（yes/no）
  
  **Tags: 并查集, 数据结构, 图论** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5 4\nu 1 2\nu 2 3\ns 1 3\ns 1 4` | `yes\nno\n` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. init: parent[i] = i, rank[i] = 0
  2. find: 递归找根，同时路径压缩（parent[x] = find(parent[x])）
  3. union: 将秩小的根挂到秩大的根下
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
