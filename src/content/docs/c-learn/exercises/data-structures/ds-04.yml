solution_code: |
  #include <stdio.h>
  #include <stdlib.h>
  #define SZ 10
  typedef struct N{int k;struct N*n;}N;
  N*t[SZ]={0};
  int h(int k){return k%SZ;}
  void ins(int k){int i=h(k);N*n=malloc(sizeof(N));n->k=k;n->n=t[i];t[i]=n;}
  int srch(int k){for(N*c=t[h(k)];c;c=c->n)if(c->k==k)return 1;return 0;}
