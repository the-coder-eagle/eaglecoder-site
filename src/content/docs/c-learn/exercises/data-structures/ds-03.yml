solution_code: |
  #include <stdio.h>
  #define MAX 100
  typedef struct{int d[MAX],m[MAX];int t;}MS;
  void init(MS*s){s->t=-1;}
  void push(MS*s,int v){s->t++;s->d[s->t]=v;s->m[s->t]=(s->t==0)?v:(v<s->m[s->t-1]?v:s->m[s->t-1]);}
