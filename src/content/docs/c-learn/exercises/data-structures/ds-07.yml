solution_code: |
  #include <stdio.h>
  #include <stdlib.h>
  #include <string.h>
  typedef struct T{struct T*c[26];int e;}T;
  T*cr(){T*t=malloc(sizeof(T));for(int i=0;i<26;i++)t->c[i]=0;t->e=0;return t;}
  void ins(T*r,char*w){T*n=r;for(int i=0;w[i];i++){int idx=w[i]-'a';if(!n->c[idx])n->c[idx]=cr();n=n->c[idx];}n->e=1;}
  int sr(T*r,char*w){T*n=r;for(int i=0;w[i];i++){int idx=w[i]-'a';if(!n->c[idx])return 0;n=n->c[idx];}return n->e;}
