solution_code: |
  #include <stdio.h>
  #define MAX 100
  int h[MAX],sz=0;
  void ins(int v){int i=sz++;h[i]=v;while(i>0){int p=(i-1)/2;if(h[p]>=h[i])break;int t=h[i];h[i]=h[p];h[p]=t;i=p;}}
  int pop(){int r=h[0];h[0]=h[--sz];int i=0;while(1){int l=2*i+1,largest=i;if(l<sz&&h[l]>h[largest])largest=l;if(l+1<sz&&h[l+1]>h[largest])largest=l+1;if(largest==i)break;int t=h[i];h[i]=h[largest];h[largest]=t;i=largest;}return r;}
