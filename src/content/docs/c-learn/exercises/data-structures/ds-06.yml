description_md: |
  ## 背景故事
  
  数据结构决定了你的程序能跑多快。HashMap 让查找变成 O(1)，堆让取最值变成 O(log n)，并查集让连通性判断快到惊人。理解这些结构的设计思想，你才能在实际项目中做出正确的技术选型。
  
  ## 题目描述
  
  用二叉最大堆实现优先队列。支持插入和取出最大值。
  命令：i v=插入v，p=取出最大值并打印，q=退出
  
  **Tags: 优先队列, 堆, 数据结构** | **Difficulty: 困难**
  
  ## 关键概念
  
  ### 基础语法
  这道题练习 C 语言的基础语法。如果不熟悉某个知识点，可以回到 Learn 模式查看对应的知识模块。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `i 5\ni 3\ni 8\ni 1\np\np\np\np\nq` | `8 5 3 1` | Sample 1 |
  
  ## 数据范围与约束
  
  - 难度等级：困难
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 堆是完全二叉树，用数组表示：左子=2*i+1，右子=2*i+2，父=(i-1)/2
  2. 插入：放到末尾，上浮（与父节点比较交换）
  3. pop：取 heap[0]，把最后一个移到 0 位置，下沉
  4. 第一步：把大问题拆解成几个小问题分别解决。
  5. 第二步：考虑时间复杂度——你的算法能处理最大规模的数据吗？
  6. 第三步：先显式处理所有边界情况，再写主逻辑。
  7. 第四步：暴力解法可能超时（TLE），选择更高效的算法。
  8. 第五步：用极端数据测试——最小值、最大值、零、负数、重复值。
  
