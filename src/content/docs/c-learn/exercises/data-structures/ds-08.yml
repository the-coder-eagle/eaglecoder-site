solution_code: |
  #include <stdio.h>
  #include <stdlib.h>
  typedef struct N{int v;struct N*n;}N;
  int has_cycle(N*h){if(!h||!h->n)return 0;N*s=h,*f=h->n;while(f&&f->n){if(s==f)return 1;s=s->n;f=f->n->n;}return 0;}
