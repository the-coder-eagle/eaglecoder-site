id: ds-08
title: "循环链表检测"
difficulty: medium
tags:
  - "链表"
  - "环形检测"
  - "双指针"
description_md: |
  ## 背景故事
  
  数据结构决定了你的程序能跑多快。HashMap 让查找变成 O(1)，堆让取最值变成 O(log n)，并查集让连通性判断快到惊人。理解这些结构的设计思想，你才能在实际项目中做出正确的技术选型。
  
  ## 题目描述
  
  判断一个单向链表是否有环（Floyd 判圈算法 / 快慢指针）。
  输入：n 个节点值，然后 k（第 k 个节点是环的入口，k=0 表示无环）。
  输出：has cycle 或 no cycle。
  
  **Tags: 链表, 环形检测, 双指针** | **Difficulty: 中等**
  
  ## 关键概念
  
  ### 链表
  链表由节点组成，每个节点有数据和指向下一个节点的指针。优点：动态增长、快速插入删除。缺点：不能随机访问（必须从头遍历）。
  
  ## 输入格式
  
  仔细阅读下面的示例，确定输入数据的格式。
  
  ## 输出格式
  
  按照题目要求输出结果。注意输出格式必须与示例完全一致（包括空格和换行）。
  
  ## 示例
  
  | 输入 | 输出 | 解释 |
  |------|------|------|
  | `5 3\n1 2 3 4 5` | `has cycle` | Sample 1 |
  | `3 0\n10 20 30` | `no cycle` | Sample 2 |
  
  ## 数据范围与约束
  
  - 难度等级：中等
  - 请考虑边界情况：零值、负数、最小值、最大值等
  - 时间限制：1 秒 | 内存限制：128 MB
  
  ## 提示
  
  1. 快指针每次走两步，慢指针每次走一步
  2. 如果相遇，说明有环
  3. 如果快指针到达 NULL，说明无环
  4. 第一步：先在纸上画出你的思路或算法流程。
  5. 第二步：确定边界情况——空输入、最大值、负数等怎么处理？
  6. 第三步：选择合适的数据结构——数组？指针？结构体？
  7. 第四步：用示例中的测试数据验证你的程序。
  8. 提示：开发时可以用 printf 打印中间变量来调试逻辑。
  
