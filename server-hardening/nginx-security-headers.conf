# ============================================================
# Nginx 安全头配置 — eaglecoder.cn
# 用法：在宝塔 Nginx 站点配置的 server 块中 include 此文件
# 路径：/www/server/panel/vhost/nginx/eaglecoder.cn.conf
# ============================================================

# --- 1. 隐藏 Nginx 版本号（不让攻击者知道你用的哪个版本）---
server_tokens off;

# --- 2. Content-Security-Policy（内容安全策略）---
# 告诉浏览器只能加载来自指定来源的资源，是最重要的安全头之一
# 当前站点需要：
#   - 自己的域名 (self)
#   - Giscus 评论 (giscus.app)
#   - 内联脚本/样式 (unsafe-inline) — 由 Astro 组件生成
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://giscus.app; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; frame-src https://giscus.app; connect-src 'self' https://giscus.app; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

# --- 3. X-Frame-Options（防止点击劫持）---
# 不允许任何网站把你的页面嵌在 iframe 里
add_header X-Frame-Options "DENY" always;

# --- 4. X-Content-Type-Options（禁止 MIME 嗅探）---
# 防止浏览器猜测文件类型（可能被利用来执行恶意文件）
add_header X-Content-Type-Options "nosniff" always;

# --- 5. Referrer-Policy（控制来源信息泄露）---
# 同站发送完整 Referer，跨站只发域名部分
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# --- 6. Permissions-Policy（限制浏览器 API 权限）---
# 你的网站不需要摄像头、麦克风、定位等
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=()" always;

# --- 7. Strict-Transport-Security（HSTS — 已在用）---
# 确保浏览器只用 HTTPS 访问，这个你已配置，确认一下
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# HSTS 已在站点配置中设置，此处不重复添加
